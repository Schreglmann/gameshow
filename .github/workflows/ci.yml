name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # config.json and games/*.json are git-crypt encrypted in CI; the test
      # suite detects the GITCRYPT magic and skips content-dependent checks.
      - name: Unit + integration tests
        run: npm test

      - name: API contract lint
        run: npm run contracts:lint
