                    type: array
                    items: { $ref: "#/components/schemas/MissingCacheEntry" }

  /api/backend/assets/videos/warmup-sdr:
    post:
      operationId: admin_warmupSdr
      tags: [admin]
      summary: Pre-transcode an HDR→SDR video segment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WarmupRequest" }
      responses:
        "200":
          description: Short-circuit JSON or SSE stream of progress
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WarmupSdrEvent" }
            text/event-stream:
              schema: { type: string, description: SSE lines }

  /api/backend/assets/videos/warmup-compressed:
    post:
      operationId: admin_warmupCompressed
      tags: [admin]
      summary: Pre-transcode an H.264 compressed segment (max 1080p)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WarmupRequest" }
      responses:
        "200":
          description: Short-circuit JSON or SSE stream of progress
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WarmupSdrEvent" }
            text/event-stream:
              schema: { type: string, description: SSE lines }

  /api/backend/assets/videos/warm-preview:
    get:
      operationId: admin_warmPreview
      tags: [admin]
      summary: Preview which videos warm-all would touch
      responses:
        "200":
          description: Videos
          content:
            application/json:
              schema:
                type: object
                required: [videos]
                properties:
                  videos:
                    type: array
                    items: { $ref: "#/components/schemas/WarmPreviewVideo" }

  /api/backend/assets/videos/warm-all:
    post:
      operationId: admin_warmAllVideos
      tags: [admin]
      summary: Queue warmup for every selected video
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                selected:
                  type: array
                  items:
                    type: object
                    required: [path, hdrProbe]
                    properties:
                      path: { type: string }
                      hdrProbe: { type: boolean }
      responses:
        "200":
          description: Job count queued
          content:
            application/json:
              schema:
                type: object
                required: [queued]
                properties:
                  queued: { type: integer }

  # ─────────────────────────────────────────────────────────────────────────
  # Admin backend — cache management (gameshow-level)
  # ─────────────────────────────────────────────────────────────────────────

  /api/backend/cache-status:
    get:
      operationId: admin_cacheStatus
      tags: [admin]
      summary: Missing segment caches for a gameshow
      parameters:
        - { name: gameshow, in: query, required: false, schema: { type: string } }
        - { name: allLanguages, in: query, required: false, schema: { type: string, enum: ["1"] } }
      responses:
        "200":
          description: Missing segments
          content:
            application/json:
              schema:
                type: object
                required: [gameshow, total, missing]
                properties:
                  gameshow: { type: string }
                  total: { type: integer }
                  missing:
                    type: array
                    items: { $ref: "#/components/schemas/MissingCacheEntry" }

  /api/backend/cache-warm-all:
    post:
      operationId: admin_cacheWarmAll
      tags: [admin]
      summary: Warm every missing cache for a gameshow (SSE progress)
      parameters:
        - { name: gameshow, in: query, required: false, schema: { type: string } }
        - { name: allLanguages, in: query, required: false, schema: { type: string, enum: ["1"] } }
      responses:
        "200":
          description: SSE stream of `WarmAllEvent`
          content:
            text/event-stream:
              schema: { type: string, description: SSE lines }

  /api/backend/cache-warm-all/cancel:
    post:
      operationId: admin_cacheWarmAllCancel
      tags: [admin]
      summary: Cancel the in-flight cache-warm run
      responses:
        "200":
          description: Cancelled?
          content:
            application/json:
              schema:
                type: object
                required: [cancelled]
                properties:
                  cancelled: { type: boolean }

  /api/backend/caches/clear:
    post:
      operationId: admin_cachesClear
      tags: [admin]
      summary: Wipe SDR + compressed + HDR caches
      responses:
        "200":
          description: Counts cleared
          content:
            application/json:
              schema:
                type: object
                required: [cleared]
                properties:
                  cleared:
                    type: object
                    required: [sdr, compressed, hdr]
                    properties:
                      sdr: { type: integer }
                      compressed: { type: integer }
                      hdr: { type: integer }

  /api/backend/cache-mode:
    get:
      operationId: admin_cacheModeGet
      tags: [admin]
      summary: Get the current background-encoding mode (balanced vs max)
      description: |
        Returns the persisted cache encoding mode. `balanced` is the default and
        runs all background ffmpeg/whisper work at utility QoS (macOS) / nice 19
        (Linux) with `BG_ENCODE_CONCURRENCY = 1` so file serving has priority.
        `max` removes all priority demotion and raises concurrency to 4 for
        prep-window throughput. See [specs/server-asset-priority.md](../server-asset-priority.md).
      responses:
        "200":
          description: Current mode
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CacheModeResponse" }
    put:
      operationId: admin_cacheModeSet
      tags: [admin]
      summary: Switch the background-encoding mode
      description: |
        Switching mode takes effect immediately — running ffmpeg/whisper PIDs are
        re-priced in place via `taskpolicy -c <utility|default> -p <pid>` (macOS)
        or `renice -n <19|0> -p <pid>` (Linux). The new concurrency cap is
        applied at the next `bgEncodeAcquire()` call; running encodes are never
        killed when switching max → balanced (the queue drains naturally).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CacheModeResponse" }
      responses:
        "200":
          description: New mode (echoes input)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CacheModeResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }

  # ─────────────────────────────────────────────────────────────────────────
  # Admin backend — YouTube download
  # ─────────────────────────────────────────────────────────────────────────

  /api/backend/assets/{category}/youtube-download:
    parameters:
      - $ref: "#/components/parameters/AssetCategory"
    post:
      operationId: admin_youtubeDownload
      tags: [admin]
      summary: Download a YouTube URL (single or playlist) into the DAM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, format: uri }
                subfolder: { type: string }
                playlist: { type: boolean }
      responses:
        "200":
          description: SSE stream of `YouTubeDownloadEvent`
          content:
            text/event-stream:
              schema: { type: string, description: SSE lines }

  /api/backend/yt-download-cancel/{jobId}:
    parameters:
      - { name: jobId, in: path, required: true, schema: { type: string } }
    post:
      operationId: admin_ytDownloadCancel
      tags: [admin]
      summary: Cancel an in-flight YouTube download
      responses:
        "200": { $ref: "#/components/responses/Ok" }

  # ─────────────────────────────────────────────────────────────────────────
  # Admin backend — audio-cover auto-fetch
  # ─────────────────────────────────────────────────────────────────────────

  /api/backend/audio-covers/list:
    get:
      operationId: admin_audioCoversList
      tags: [admin]
      summary: Covers already fetched and stored
      responses:
        "200":
          description: Cover filenames
          content:
            application/json:
              schema:
                type: object
                required: [covers]
                properties:
                  covers:
                    type: array
                    items: { type: string }

  /api/backend/audio-cover-fetch:
    post:
      operationId: admin_audioCoverFetch
      tags: [admin]
      summary: Batch-fetch covers by artist/title lookup (SSE)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: SSE stream of `AudioCoverEvent`
          content:
            text/event-stream:
              schema: { type: string, description: SSE lines }

  /api/backend/audio-cover-cancel/{jobId}:
    parameters:
      - { name: jobId, in: path, required: true, schema: { type: string } }
    post:
      operationId: admin_audioCoverCancel
      tags: [admin]
      summary: Cancel a running audio-cover fetch job
      responses:
        "200": { $ref: "#/components/responses/Ok" }

  /api/backend/audio-cover-confirm/{jobId}/{fileIndex}:
    parameters:
      - { name: jobId, in: path, required: true, schema: { type: string } }
      - { name: fileIndex, in: path, required: true, schema: { type: integer } }
    post:
      operationId: admin_audioCoverConfirm
      tags: [admin]
      summary: Accept or reject a found cover (confirm phase)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accept]
              properties:
                accept: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/Ok" }

  /api/backend/audio-cover-job/{jobId}:
    parameters:
      - { name: jobId, in: path, required: true, schema: { type: string } }
    delete:
      operationId: admin_audioCoverJobDismiss
      tags: [admin]
      summary: Dismiss a done/errored audio-cover job from the list
      responses:
        "200": { $ref: "#/components/responses/Ok" }

  /api/backend/audio-cover/meta:
    get:
      operationId: admin_audioCoverMeta
      tags: [admin]
      summary: Per-cover provenance (source, timestamp, origin image)
      description: Backs the source pill in the audio preview. Keyed by cover filename (`{audioBasename}.jpg`).
      responses:
        "200":
          description: Meta map
          content:
            application/json:
              schema:
                type: object
                required: [meta]
                properties:
                  meta:
                    type: object
                    additionalProperties: { $ref: "#/components/schemas/AudioCoverMetaEntry" }

  /api/backend/audio-cover/override:
    post:
      operationId: admin_audioCoverOverride
      tags: [admin]
      summary: Replace an audio's cover with an image from the DAM
      description: |
        Copies the bytes at `sourceImagePath` to the canonical cover path
        `/images/Audio-Covers/{audioBasename}.jpg`. Removes any stale
        `YouTube Thumbnails/` sibling. Marks the cover as `manual` in the
        sidecar meta.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [audioFileName, sourceImagePath]
              properties:
                audioFileName:
                  type: string
                  description: Path relative to `audio/` category
                sourceImagePath:
                  type: string
                  description: Path of the source image. Accepts either `/images/foo.jpg` or `foo.jpg` (relative to `images/`).
      responses:
        "200":
          description: Cover replaced
          content:
            application/json:
              schema:
                type: object
                required: [success, coverPath, version]
                properties:
                  success: { type: boolean, enum: [true] }
                  coverPath: { type: string }
                  version: { type: number }
        "400": { $ref: "#/components/responses/BadRequest" }
        "500":
          description: Filesystem/IO error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/backend/audio-cover/itunes:
    post:
      operationId: admin_audioCoverItunes
      tags: [admin]
      summary: Fetch an iTunes cover and overwrite the canonical cover
      description: |
        Confident matches apply immediately. Unconfident matches return a
        short-lived `confirmToken` that the client echoes back on a second
        call to accept the candidate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [audioFileName]
              properties:
                audioFileName: { type: string }
                confirmToken:
                  type: string
                  description: Token from a prior unconfident response.
      responses:
        "200":
          description: Cover replaced OR candidate awaiting confirmation
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [success, coverPath, version, source]
                    properties:
                      success: { type: boolean, enum: [true] }
                      coverPath: { type: string }
                      version: { type: number }
                      source: { type: string, enum: [itunes] }
                  - type: object
                    required: [confirmRequired, confirmToken, candidate]
                    properties:
                      confirmRequired: { type: boolean, enum: [true] }
                      confirmToken: { type: string }
                      candidate:
                        type: object
                        required: [artist, track, url, source]
                        properties:
                          artist: { type: string }
                          track: { type: string }
                          url: { type: string, format: uri }
                          source: { type: string, enum: [itunes] }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404":
          description: "No iTunes match (error: no_match) or token expired"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "429":
          description: "iTunes search rate-limited (error: rate_limited)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  # ─────────────────────────────────────────────────────────────────────────
  # Admin backend — system status
  # ─────────────────────────────────────────────────────────────────────────

  /api/backend/system-status:
    get:
      operationId: admin_systemStatus
      tags: [admin]
      summary: One-shot read of the aggregated system-status payload
      description: Same shape as the `system-status` WebSocket push (see asyncapi.yaml).
      responses:
        "200":
          description: System status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SystemStatusResponse" }

  /api/backend/system/svg-manifests:
    get:
      operationId: admin_listSvgManifests
      tags: [admin]
      summary: Current status of every public-logo SVG manifest
      description: |
        Backs the System tab's SVG-Logo-Manifeste card. The same array is also
        embedded in `SystemStatusResponse.caches.svgManifests`.
      responses:
        "200":
          description: Status list
          content:
            application/json:
              schema:
                type: object
                required: [manifests]
                properties:
                  manifests:
                    type: array
                    items: { $ref: "#/components/schemas/SvgManifestStatus" }
    delete:
      operationId: admin_deleteSvgManifests
      tags: [admin]
      summary: Drop a single SVG manifest or all of them
      description: |
        Clears the in-memory + on-disk cache. Subsequent `github-svg` searches
        return no hits until the manifest is refreshed.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { $ref: "#/components/schemas/SvgManifestId" }
      responses:
        "200":
          description: New status
          content:
            application/json:
              schema:
                type: object
                required: [manifests]
                properties:
                  manifests:
                    type: array
                    items: { $ref: "#/components/schemas/SvgManifestStatus" }

  /api/backend/system/svg-manifests/refresh:
    post:
      operationId: admin_refreshSvgManifests
      tags: [admin]
      summary: Rebuild a single SVG manifest from its source, or all of them
      description: |
        Pulls the latest tree (gilbarbara, simple-icons via GitHub Trees API)
        or the canonical `svgs.json` (detain), persists the new manifest, and
        returns the updated status array.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { $ref: "#/components/schemas/SvgManifestId" }
      responses:
        "200":
          description: New status
          content:
            application/json:
              schema:
                type: object
                required: [manifests]
                properties:
                  manifests:
                    type: array
                    items: { $ref: "#/components/schemas/SvgManifestStatus" }
        "502":
          description: Upstream (GitHub / raw.githubusercontent.com) failed
          content:
            application/json:
              schema:
                type: object
                properties: { error: { type: string } }

