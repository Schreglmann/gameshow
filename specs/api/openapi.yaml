        "200":
          description: SSE stream of `WarmAllEvent`
          content:
            text/event-stream:
              schema: { type: string, description: SSE lines }

  /api/backend/cache-warm-all/cancel:
    post:
      operationId: admin_cacheWarmAllCancel
      tags: [admin]
      summary: Cancel the in-flight cache-warm run
      responses:
        "200":
          description: Cancelled?
          content:
            application/json:
              schema:
                type: object
                required: [cancelled]
                properties:
                  cancelled: { type: boolean }

  /api/backend/caches/clear:
    post:
      operationId: admin_cachesClear
      tags: [admin]
      summary: Wipe SDR + compressed + HDR caches
      responses:
        "200":
          description: Counts cleared
          content:
            application/json:
              schema:
                type: object
                required: [cleared]
                properties:
                  cleared:
                    type: object
                    required: [sdr, compressed, hdr]
                    properties:
                      sdr: { type: integer }
                      compressed: { type: integer }
                      hdr: { type: integer }

  /api/backend/cache-mode:
    get:
      operationId: admin_cacheModeGet
      tags: [admin]
      summary: Get the current background-encoding mode (balanced vs max)
      description: |
        Returns the persisted cache encoding mode. `balanced` is the default and
        runs all background ffmpeg/whisper work at utility QoS (macOS) / nice 19
        (Linux) with `BG_ENCODE_CONCURRENCY = 1` so file serving has priority.
        `max` removes all priority demotion and raises concurrency to 4 for
        prep-window throughput. See [specs/server-asset-priority.md](../server-asset-priority.md).
      responses:
        "200":
          description: Current mode
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CacheModeResponse" }
    put:
      operationId: admin_cacheModeSet
      tags: [admin]
      summary: Switch the background-encoding mode
      description: |
        Switching mode takes effect immediately — running ffmpeg/whisper PIDs are
        re-priced in place via `taskpolicy -c <utility|default> -p <pid>` (macOS)
        or `renice -n <19|0> -p <pid>` (Linux). The new concurrency cap is
        applied at the next `bgEncodeAcquire()` call; running encodes are never
        killed when switching max → balanced (the queue drains naturally).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CacheModeResponse" }
      responses:
        "200":
          description: New mode (echoes input)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CacheModeResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/backend/nas-sync-config:
    get:
      operationId: admin_nasSyncConfigGet
      tags: [admin]
      summary: Get the configurable NAS base path + on/off toggle
      description: |
        Returns the operator-configurable NAS sync settings persisted in
        `nas-sync-prefs.json`. `basePath` is the configured NAS mount;
        `activeBasePath` is the path resolved at server boot (the one currently in
        effect). When they differ, `restartRequired` is true — the path change
        applies only after a server restart. The `enabled` toggle applies live.
        See [specs/nas-sync-config.md](../nas-sync-config.md).
      responses:
        "200":
          description: Current NAS sync config
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NasSyncConfig" }
    put:
      operationId: admin_nasSyncConfigSet
      tags: [admin]
      summary: Update the NAS base path and/or the on/off toggle
      description: |
        Persists a partial update. `basePath` must be a non-empty absolute path;
        the change takes effect after a server restart. `enabled` applies live,
        gating sync write/propagation (not NAS reads). Returns the full config.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                basePath: { type: string, description: Absolute NAS base path }
                enabled: { type: boolean }
      responses:
        "200":
          description: Updated NAS sync config
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NasSyncConfig" }
        "400": { $ref: "#/components/responses/BadRequest" }

