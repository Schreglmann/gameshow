      responses:
        "200": { $ref: "#/components/responses/Ok" }

  /api/backend/audio-cover/meta:
    get:
      operationId: admin_audioCoverMeta
      tags: [admin]
      summary: Per-cover provenance (source, timestamp, origin image)
      description: Backs the source pill in the audio preview. Keyed by cover filename (`{audioBasename}.jpg`).
      responses:
        "200":
          description: Meta map
          content:
            application/json:
              schema:
                type: object
                required: [meta]
                properties:
                  meta:
                    type: object
                    additionalProperties: { $ref: "#/components/schemas/AudioCoverMetaEntry" }

  /api/backend/nas-sync-conflicts:
    get:
      operationId: admin_listNasSyncConflicts
      tags: [admin]
      summary: List deletions the sync safety layers refused
      description: |
        Deletions withheld by Layer 2 (per-folder loss-ratio veto) or Layer 3
        (bulk-delete cap). Backs the "NAS-Sync-Konflikte" card in the System tab.
        The live count is also exposed as `SystemStatusResponse.nasSync.conflictCount`.
      responses:
        "200":
          description: Conflicts sorted by folder then rel
          content:
            application/json:
              schema:
                type: object
                required: [conflicts]
                properties:
                  conflicts:
                    type: array
                    items: { $ref: "#/components/schemas/NasSyncConflictEntry" }

  /api/backend/nas-sync-conflicts/resolve:
    post:
      operationId: admin_resolveNasSyncConflicts
      tags: [admin]
      summary: Resolve a batch of refused deletions
      description: |
        `restore` re-copies the surviving file to the side that lost it;
        `delete` soft-deletes the surviving copy (recoverable in `.trash/` for
        30 days). Both reconcile the sync snapshot so the veto stops recurring.
        Requires the NAS to be reachable. A per-file failure never aborts the batch.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rels, resolution]
              properties:
                rels:
                  type: array
                  minItems: 1
                  items: { type: string }
                  description: Conflict rel paths (as returned by the list endpoint).
                resolution:
                  type: string
                  enum: [restore, delete]
      responses:
        "200":
          description: Batch result
          content:
            application/json:
              schema:
                type: object
                required: [resolved, failed]
                properties:
                  resolved: { type: integer }
                  failed:
                    type: array
                    items:
                      type: object
                      required: [rel, error]
                      properties:
                        rel: { type: string }
                        error: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "503":
          description: NAS not reachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/backend/audio-cover/override:
    post:
      operationId: admin_audioCoverOverride
      tags: [admin]
      summary: Replace an audio's cover with an image from the DAM
      description: |
        Copies the bytes at `sourceImagePath` to the canonical cover path
        `/images/Audio-Covers/{audioBasename}.jpg`. Removes any stale
        `YouTube Thumbnails/` sibling. Marks the cover as `manual` in the
        sidecar meta.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [audioFileName, sourceImagePath]
              properties:
                audioFileName:
                  type: string
                  description: Path relative to `audio/` category
                sourceImagePath:
                  type: string
                  description: Path of the source image. Accepts either `/images/foo.jpg` or `foo.jpg` (relative to `images/`).
      responses:
        "200":
          description: Cover replaced
          content:
            application/json:
              schema:
                type: object
                required: [success, coverPath, version]
                properties:
                  success: { type: boolean, enum: [true] }
                  coverPath: { type: string }
                  version: { type: number }
        "400": { $ref: "#/components/responses/BadRequest" }
        "500":
          description: Filesystem/IO error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/backend/audio-cover/itunes:
    post:
      operationId: admin_audioCoverItunes
      tags: [admin]
      summary: Fetch an iTunes cover and overwrite the canonical cover
      description: |
        Confident matches apply immediately. Unconfident matches return a
        short-lived `confirmToken` that the client echoes back on a second
        call to accept the candidate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [audioFileName]
              properties:
                audioFileName: { type: string }
                confirmToken:
                  type: string
                  description: Token from a prior unconfident response.
      responses:
        "200":
          description: Cover replaced OR candidate awaiting confirmation
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [success, coverPath, version, source]
                    properties:
                      success: { type: boolean, enum: [true] }
                      coverPath: { type: string }
                      version: { type: number }
                      source: { type: string, enum: [itunes] }
                  - type: object
                    required: [confirmRequired, confirmToken, candidate]
                    properties:
                      confirmRequired: { type: boolean, enum: [true] }
                      confirmToken: { type: string }
                      candidate:
                        type: object
                        required: [artist, track, url, source]
                        properties:
                          artist: { type: string }
                          track: { type: string }
                          url: { type: string, format: uri }
                          source: { type: string, enum: [itunes] }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404":
          description: "No iTunes match (error: no_match) or token expired"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "429":
          description: "iTunes search rate-limited (error: rate_limited)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  # ─────────────────────────────────────────────────────────────────────────
  # Admin backend — system status
  # ─────────────────────────────────────────────────────────────────────────

  /api/backend/system-status:
    get:
      operationId: admin_systemStatus
      tags: [admin]
      summary: One-shot read of the aggregated system-status payload
      description: Same shape as the `system-status` WebSocket push (see asyncapi.yaml).
      responses:
        "200":
          description: System status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SystemStatusResponse" }

  /api/backend/system/svg-manifests:
    get:
      operationId: admin_listSvgManifests
      tags: [admin]
      summary: Current status of every public-logo SVG manifest
      description: |
        Backs the System tab's SVG-Logo-Manifeste card. The same array is also
        embedded in `SystemStatusResponse.caches.svgManifests`.
      responses:
        "200":
          description: Status list
          content:
            application/json:
              schema:
                type: object
                required: [manifests]
                properties:
                  manifests:
                    type: array
                    items: { $ref: "#/components/schemas/SvgManifestStatus" }
    delete:
      operationId: admin_deleteSvgManifests
      tags: [admin]
      summary: Drop a single SVG manifest or all of them
      description: |
        Clears the in-memory + on-disk cache. Subsequent `github-svg` searches
        return no hits until the manifest is refreshed.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { $ref: "#/components/schemas/SvgManifestId" }
      responses:
        "200":
          description: New status
          content:
            application/json:
              schema:
                type: object
                required: [manifests]
                properties:
                  manifests:
                    type: array
                    items: { $ref: "#/components/schemas/SvgManifestStatus" }

  /api/backend/system/svg-manifests/refresh:
    post:
      operationId: admin_refreshSvgManifests
      tags: [admin]
      summary: Rebuild a single SVG manifest from its source, or all of them
      description: |
        Pulls the latest tree (gilbarbara, simple-icons via GitHub Trees API)
        or the canonical `svgs.json` (detain), persists the new manifest, and
        returns the updated status array.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { $ref: "#/components/schemas/SvgManifestId" }
      responses:
        "200":
          description: New status
          content:
            application/json:
              schema:
                type: object
                required: [manifests]
                properties:
                  manifests:
                    type: array
                    items: { $ref: "#/components/schemas/SvgManifestStatus" }
        "502":
          description: Upstream (GitHub / raw.githubusercontent.com) failed
          content:
            application/json:
              schema:
                type: object
                properties: { error: { type: string } }

