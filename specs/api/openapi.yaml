openapi: 3.1.0
info:
  title: Gameshow API
  version: 2.0.0
  summary: HTTP contract for the gameshow backend
  description: |
    Source of truth for every REST endpoint the gameshow server exposes.

    This document pairs with [asyncapi.yaml](asyncapi.yaml), which covers the
    WebSocket channel contract, and with the three replacement guides under
    `docs/replace-*.md`.

    **Zone tags.** Every operation carries one tag indicating which PWA may
    legitimately call it:

    - `frontend` — show PWA (`/show/`)
    - `admin` — admin CMS PWA (`/admin/`)
    - `gamemaster` — gamemaster PWA (`/gamemaster/`)
    - `shared` — called by two or more PWAs
    - `internal` — static serving / SPA fallback; not called by PWA code directly

    A replacement service for a given zone must implement (or consume, if it is
    a client replacement) exactly the operations tagged with that zone plus any
    tagged `shared`.

    **No authentication.** Every endpoint is unauthenticated — the app runs on
    a trusted LAN during a live event. Replacement services MAY add auth, but
    doing so breaks all three current PWAs; they would need corresponding edits.
  license:
    name: Private
    url: https://github.com/Schreglmann/gameshow
  contact:
    name: Georg Schreglmann
    email: georg.schreglmann@vivid-planet.com

servers:
  - url: http://localhost:3000
    description: Local dev server
  - url: http://{host}:{port}
    description: LAN deployment
    variables:
      host:
        default: 192.168.1.100
        description: LAN hostname or IP of the host machine
      port:
        default: "3000"

tags:
  - name: frontend
    description: Show PWA contract surface
  - name: admin
    description: Admin CMS PWA contract surface
  - name: gamemaster
    description: Gamemaster PWA contract surface
  - name: shared
    description: Endpoints called by two or more PWAs
  - name: internal
    description: Server-internal (static asset serving, SPA fallback)

security: []

paths:

  # ─────────────────────────────────────────────────────────────────────────
  # Internal / static
  # ─────────────────────────────────────────────────────────────────────────

  /:
    get:
      operationId: internal_root
      tags: [internal]
      summary: Dev server root
      description: Dev mode serves a redirect to `/show/`. In production this path is handled by the SPA fallback.
      responses:
        "200":
          description: HTML redirect page or SPA entry

  /videos-compressed/{start}/{end}/{splat}:
    get:
      operationId: frontend_getVideoCompressed
      tags: [frontend]
      summary: Stream a pre-transcoded H.264 SDR segment of a video asset
      description: |
        Returns a cached H.264 compressed segment of the specified video
        between `start` and `end` seconds. Supports HTTP range requests; the
        player uses this endpoint to stream segments without full-file
        preload.
      parameters:
        - $ref: "#/components/parameters/VideoStart"
        - $ref: "#/components/parameters/VideoEnd"
        - $ref: "#/components/parameters/VideoSplat"
      responses:
        "200":
          description: Full file (no range header)
          content:
            video/mp4: {}
        "206":
          description: Partial content (range request)
          content:
            video/mp4: {}
        "404":
          $ref: "#/components/responses/NotFound"

  /api/random-frame:
    get:
      operationId: frontend_getRandomFrame
      tags: [frontend]
      summary: Extract a random still frame from a video (random-frame game)
      description: |
        Extracts a single still frame from the video at `path`, at a
        pseudo-random timestamp determined by `seed` within `[start, end]`
        seconds. Unset bounds default to a fraction of the real runtime (start 5 %,
        end 92 %) so frames span the whole film — falling back to 180–900 s only when
        the duration can't be probed; bounds are clamped to the real duration. Near-black /
        near-uniform frames are skipped automatically. The result is cached on
        disk by `(path, seed)`, so the same seed always returns the same frame;
        the gamemaster re-rolls by requesting a new seed.

        When the source video is unreachable (e.g. a NAS-only file with the NAS not
        mounted at a live event), the server falls back to prerendered frames
        downloaded ahead of time (per question) via the admin `random-frame/prerender`
        endpoint, selecting `variant % count` of the downloaded variants. With
        `prerendered=1` the server serves only that downloaded frame (skipping live
        extraction) — used by the show as a stopgap while a live frame is still loading.
      parameters:
        - { name: path, in: query, required: true, schema: { type: string }, description: "Video path relative to the videos asset root (no leading /videos/)." }
        - { name: seed, in: query, required: false, schema: { type: integer }, description: "Deterministic frame selector. Same seed ⇒ same frame; bump to re-roll." }
        - { name: variant, in: query, required: false, schema: { type: integer }, description: "GM rotate counter (default 0). For a reachable source it's folded into the seed (each rotate = new frame); for the prerendered fallback it selects variant % count of the downloaded variants." }
        - { name: qindex, in: query, required: false, schema: { type: integer }, description: "Question's original (pre-shuffle) index (default 0). Prerendered frames are stored per question, so the same movie in several questions has distinct downloaded frames." }
        - { name: prerendered, in: query, required: false, schema: { type: string, enum: ['1'] }, description: "When '1', serve only the downloaded fallback frame (skip live extraction); 404 if none exists. By default variant maps through the marked 'first' frame; pass `slot` to address a raw file." }
        - { name: slot, in: query, required: false, schema: { type: integer }, description: "With prerendered=1, address a downloaded variant by its raw index (ignoring the 'first' marker) — used by the admin preview." }
        - { name: start, in: query, required: false, schema: { type: number }, description: "Earliest second (skip intro). Defaults to 5% of the runtime (fallback 180)." }
        - { name: end, in: query, required: false, schema: { type: number }, description: "Latest second (skip outro). Defaults to 92% of the runtime (fallback 900), clamped to duration." }
      responses:
        "200":
          description: The extracted JPEG frame
          content:
            image/jpeg: { schema: { type: string, format: binary } }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /videos-sdr/{start}/{end}/{splat}:
    get:
      operationId: frontend_getVideoSdr
      tags: [frontend]
      summary: Stream a pre-transcoded HDR→SDR tone-mapped segment
      description: Like `/videos-compressed` but for source videos flagged as HDR. The player calls `/api/video-hdr` first to decide between the two endpoints.
      parameters:
        - $ref: "#/components/parameters/VideoStart"
        - $ref: "#/components/parameters/VideoEnd"
        - $ref: "#/components/parameters/VideoSplat"
      responses:
        "200":
          description: Full file
          content: { video/mp4: {} }
        "206":
          description: Partial content
          content: { video/mp4: {} }
        "404":
          $ref: "#/components/responses/NotFound"

  /{spaFallback}:
    get:
      operationId: internal_spaFallback
      tags: [internal]
      summary: SPA fallback — returns index.html for any unmatched path
      description: Production-only catch-all so deep-links into `/show/...`, `/admin/...`, `/gamemaster/...` resolve to the right PWA's `index.html`.
      parameters:
        - name: spaFallback
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: HTML

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend / shared public API
  # ─────────────────────────────────────────────────────────────────────────

  /api/background-music:
    get:
      operationId: frontend_listBackgroundMusic
      tags: [frontend]
      summary: List background music MP3 filenames
      parameters:
        - name: theme
          in: query
          required: false
          description: Optional theme subfolder to filter by
          schema: { type: string }
      responses:
        "200":
          description: Array of filenames
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
              example: ["bg-calm.mp3", "bg-intense.mp3"]

  /api/settings:
    get:
      operationId: shared_getSettings
      tags: [shared]
      summary: Global settings for the active gameshow
      description: Called by show and gamemaster PWAs on mount. Small, fast. Re-reads `config.json` on every call.
      responses:
        "200":
          description: Settings snapshot
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SettingsResponse" }

  /api/theme:
    get:
      operationId: shared_getTheme
      tags: [shared]
      summary: Current theme selection for frontend and admin PWAs
      responses:
        "200":
          description: Theme names
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ThemeSettings" }
    put:
      operationId: shared_saveTheme
      tags: [shared]
      summary: Partial theme update (only provided keys are written)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ThemeSettingsPartial" }
      responses:
        "200":
          description: Updated theme names
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ThemeSettings" }

  /api/video-hdr:
    get:
      operationId: frontend_checkVideoHdr
      tags: [frontend]
      summary: Whether a video asset is HDR
      parameters:
        - name: path
          in: query
          required: true
          description: Asset-relative path (e.g. `videos/subfolder/clip.mp4`)
          schema: { type: string }
      responses:
        "200":
          description: HDR flag
          content:
            application/json:
              schema:
                type: object
                required: [isHdr]
                properties:
                  isHdr: { type: boolean }

  /api/game/{index}:
    get:
      operationId: shared_getGame
      tags: [shared]
      summary: Resolve the game at `gameOrder[index]` into full game data
      description: |
        Called by show and gamemaster PWAs on game transitions. The server
        resolves `gameOrder[index]` (which may be `name` for a single-instance
        game or `name/instance` for a multi-instance game) into a concrete
        `GameConfig` and returns that plus navigation metadata.
      parameters:
        - name: index
          in: path
          required: true
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Game data
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GameDataResponse" }
        "404":
          $ref: "#/components/responses/NotFound"

  /api/backend/stream-notify:
    post:
      operationId: frontend_streamNotify
      tags: [frontend]
      summary: Frontend signals video/audio stream activity
      description: |
        Called by the show PWA on video/audio play/pause (Lightbox, VideoGuess,
        useVideoPlayback). While a stream is active the server throttles NAS
        background sync and chunked uploads to leave network headroom for the
        show. The historical `/api/backend/` path prefix is misleading — this
        endpoint is frontend, not admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [active]
              properties:
                active: { type: boolean }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }

  # ─────────────────────────────────────────────────────────────────────────
  # Admin backend — games CRUD
  # ─────────────────────────────────────────────────────────────────────────

  /api/backend/games:
    get:
      operationId: admin_listGames
      tags: [admin]
      summary: List every game file with metadata
      responses:
        "200":
          description: Summaries keyed by game slug
          content:
            application/json:
              schema:
                type: object
                required: [games]
                properties:
                  games:
                    type: array
                    items: { $ref: "#/components/schemas/GameFileSummary" }
    post:
      operationId: admin_createGame
      tags: [admin]
      summary: Create a new game file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileName, gameFile]
              properties:
                fileName: { type: string, description: "Game slug without .json" }
                gameFile:
                  description: Either a single-instance or multi-instance game payload
                  oneOf:
                    - { $ref: "#/components/schemas/GameConfig" }
                    - { $ref: "#/components/schemas/MultiInstanceGameFile" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/backend/games/examples:
    post:
      operationId: admin_createExampleGames
      tags: [admin]
      summary: Generate example games ("Beispiele") + media and activate the example gameshow
      description: >-
        Writes one example game per type (except video-guess) to
        games/beispiel-*.json, generates their images (sharp) and audio (ffmpeg)
        into local-assets/, then adds and activates a "beispiele" gameshow.
        Idempotent. Backs the admin "Beispiele erstellen" button and
        `npm run fixtures`. See specs/example-games.md.
      responses:
        "200":
          description: Created example games and activated the gameshow
          content:
            application/json:
              schema:
                type: object
                required: [success, createdGames, gameshow]
                properties:
                  success: { type: boolean }
                  createdGames:
                    type: array
                    items: { type: string }
                  gameshow: { type: string }
        "500":
          description: Generation failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/backend/games/{fileName}:
    parameters:
      - $ref: "#/components/parameters/GameFileName"
    get:
      operationId: admin_getGame
      tags: [admin]
      summary: Read a single game file verbatim
      responses:
        "200":
          description: Raw game JSON
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/GameConfig" }
                  - { $ref: "#/components/schemas/MultiInstanceGameFile" }
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: admin_saveGame
      tags: [admin]
      summary: Atomically overwrite a game file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - { $ref: "#/components/schemas/GameConfig" }
                - { $ref: "#/components/schemas/MultiInstanceGameFile" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "400": { $ref: "#/components/responses/BadRequest" }
    delete:
      operationId: admin_deleteGame
      tags: [admin]
      summary: Delete a game file and cascade-remove its gameOrder references
      description: >
        Deletes the game file, then removes every gameOrder reference to it (bare or
        instance-qualified) from all gameshows in config.json, so the deleted game can never
        leave a dangling reference. See specs/config-gameorder-cascade.md.
      responses:
        "200":
          description: Deleted; lists any gameOrder references cleaned up
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GameDeletionResult" }
        "404":
          $ref: "#/components/responses/NotFound"

  /api/backend/games/{fileName}/rename:
    parameters:
      - $ref: "#/components/parameters/GameFileName"
    post:
      operationId: admin_renameGame
      tags: [admin]
      summary: Rename a game file and rewrite gameOrder references
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newFileName]
              properties:
                newFileName: { type: string }
      responses:
        "200":
          description: New filename
          content:
            application/json:
              schema:
                type: object
                required: [newFileName]
                properties:
                  newFileName: { type: string }

  /api/backend/games/{fileName}/convert-to-multi:
    parameters:
      - $ref: "#/components/parameters/GameFileName"
    post:
      operationId: admin_convertGameToMulti
      tags: [admin]
      summary: Convert a single-instance game to multi-instance and requalify gameOrder references
      description: >
        Restructures a single-instance game file so its existing content becomes instance `v1`
        (top-level type/title/rules/randomizeQuestions stay at the base), then re-points every bare
        gameOrder reference `<fileName>` to `<fileName>/v1` across all gameshows in config.json so
        the live show keeps resolving. Idempotent: a file that already has `instances` is returned
        unchanged with `alreadyMulti: true` and no references are rewritten. See
        specs/config-gameorder-cascade.md.
      responses:
        "200":
          description: Converted game file plus any requalified gameOrder references
          content:
            application/json:
              schema:
                type: object
                required: [success, gameFile, rewrittenRefs]
                properties:
                  success: { type: boolean, const: true }
                  gameFile:
                    type: object
                    description: The resulting multi-instance game file.
                  alreadyMulti:
                    type: boolean
                    description: True when the file already had instances and was returned unchanged.
                  rewrittenRefs:
                    type: array
                    description: gameOrder references re-pointed to the new `/v1` instance.
                    items:
                      type: object
                      required: [gameshow, ref]
                      properties:
                        gameshow:
                          type: string
                          description: Key of the gameshow whose gameOrder entry was rewritten.
                        ref:
                          type: string
                          description: The new gameOrder entry (e.g. "trump-oder-hitler/v1").
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/backend/games/{fileName}/instances/{instance}:
    parameters:
      - $ref: "#/components/parameters/GameFileName"
      - name: instance
        in: path
        required: true
        schema: { type: string }
    delete:
      operationId: admin_deleteGameInstance
      tags: [admin]
      summary: Delete one instance of a multi-instance game and cascade-remove its gameOrder reference
      description: >
        Removes the instance from the game file, then removes the gameOrder reference equal to
        `<fileName>/<instance>` from all gameshows in config.json. Other instances of the same
        game and their references are left intact. See specs/config-gameorder-cascade.md.
      responses:
        "200":
          description: Deleted; lists any gameOrder references cleaned up
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GameDeletionResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404":
          $ref: "#/components/responses/NotFound"

  /api/backend/games/{fileName}/instances/{instance}/unlock-precheck:
    parameters:
      - $ref: "#/components/parameters/GameFileName"
      - name: instance
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: admin_videoGuessUnlockPrecheck
      tags: [admin]
      summary: Pre-flight for video-guess instance lock — what would break if unlocked?
      responses:
        "200":
          description: Missing caches and offline references
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnlockPrecheckResponse" }

  # ─────────────────────────────────────────────────────────────────────────
  # Admin backend — config
  # ─────────────────────────────────────────────────────────────────────────

  /api/backend/config:
    get:
      operationId: admin_getConfig
      tags: [admin]
      summary: Read the full config.json
      responses:
        "200":
          description: Full app config
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppConfig" }
    put:
      operationId: admin_saveConfig
      tags: [admin]
      summary: Atomically overwrite config.json
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AppConfig" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "400": { $ref: "#/components/responses/BadRequest" }

  # ─────────────────────────────────────────────────────────────────────────
  # Admin backend — bandle
  # ─────────────────────────────────────────────────────────────────────────

  /api/backend/bandle/catalog:
    get:
      operationId: admin_bandleCatalog
      tags: [admin]
      summary: List Bandle tracks available to the bandle game editor
      responses:
        "200":
          description: Catalog entries
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BandleCatalogEntry" }

  /api/backend/bandle/available-audio:
    get:
      operationId: admin_bandleAvailableAudio
      tags: [admin]
      summary: List Bandle audio files already downloaded into local storage
      responses:
        "200":
          description: Filenames already downloaded into `local-assets/bandle-audio/`
          content:
            application/json:
              schema: { type: array, items: { type: string } }

  /api/backend/bandle/audio-status/{bandlePath}:
    parameters:
      - name: bandlePath
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: admin_bandleAudioStatus
      tags: [admin]
      summary: Per-track download status
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, enum: [missing, downloading, ready] }
                  percent: { type: number }

  /api/backend/bandle/download-audio:
    post:
      operationId: admin_bandleDownloadAudio
      tags: [admin]
      summary: Queue a Bandle audio download
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bandlePath]
              properties:
                bandlePath: { type: string }
      responses:
        "200":
          description: Job queued
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
                  jobId: { type: string }

  # ─────────────────────────────────────────────────────────────────────────
  # Admin backend — assets / DAM
  # ─────────────────────────────────────────────────────────────────────────

  /api/backend/assets/{category}:
    parameters:
      - $ref: "#/components/parameters/AssetCategory"
    get:
      operationId: admin_listAssets
      tags: [admin]
      summary: List assets in a category (recursive)
      responses:
        "200":
          description: Asset list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssetListResponse" }

  /api/backend/assets/{category}/dimensions:
    parameters:
      - $ref: "#/components/parameters/AssetCategory"
    get:
      operationId: admin_getImageDimensions
      tags: [admin]
      summary: Probe and return natural pixel dimensions for every raster image
      description: |
        Synchronous probe of every raster image in the category (SVGs skipped). Reads
        from a server-side cache keyed by file mtime; missing entries are extracted
        via `sharp` before the response is sent. Only the `images` category produces
        a non-empty map; other categories return `{ dimensions: {} }`. Backs the DAM
        "Niedrige Auflösung" filter and "Auflösung" sort — the client calls this
        eagerly when entering the Bilder tab so both work without waiting.
      responses:
        "200":
          description: Dimension map
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImageDimensionsResponse" }

  /api/backend/assets/{category}/upload:
    parameters:
      - $ref: "#/components/parameters/AssetCategory"
      - name: subfolder
        in: query
        required: false
        schema: { type: string }
    post:
      operationId: admin_uploadAsset
      tags: [admin]
      summary: Single-request multipart upload (≤10 MB)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        "200":
          description: Uploaded file name
          content:
            application/json:
              schema:
                type: object
                required: [fileName]
                properties:
                  fileName: { type: string }

  /api/backend/assets/{category}/upload-chunk:
    parameters:
      - $ref: "#/components/parameters/AssetCategory"
      - name: uploadId
        in: query
        required: true
        schema: { type: string, format: uuid }
      - name: chunkIndex
        in: query
        required: true
        schema: { type: integer, minimum: 0 }
      - name: totalChunks
        in: query
        required: true
        schema: { type: integer, minimum: 1 }
      - name: fileName
        in: query
        required: true
        schema: { type: string }
      - name: subfolder
        in: query
        required: false
        schema: { type: string }
    post:
      operationId: admin_uploadAssetChunk
      tags: [admin]
      summary: One chunk of a large multi-part upload
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [chunk]
              properties:
                chunk: { type: string, format: binary }
      responses:
        "200": { $ref: "#/components/responses/Ok" }

  /api/backend/assets/{category}/upload-finalize:
    parameters:
      - $ref: "#/components/parameters/AssetCategory"
    post:
      operationId: admin_uploadAssetFinalize
      tags: [admin]
      summary: Assemble uploaded chunks into the final file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [uploadId, fileName, totalChunks]
              properties:
                uploadId: { type: string, format: uuid }
                fileName: { type: string }
                totalChunks: { type: integer }
                subfolder: { type: string }
      responses:
        "200":
          description: Finalized file name
          content:
            application/json:
              schema:
                type: object
                required: [fileName]
                properties:
                  fileName: { type: string }

  /api/backend/assets/{category}/upload-abort:
    parameters:
      - $ref: "#/components/parameters/AssetCategory"
    post:
      operationId: admin_uploadAssetAbort
      tags: [admin]
      summary: Clean up an aborted chunked upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [uploadId]
              properties:
                uploadId: { type: string, format: uuid }
      responses:
        "200": { $ref: "#/components/responses/Ok" }

  /api/backend/assets/{category}/download-url:
    parameters:
      - $ref: "#/components/parameters/AssetCategory"
    post:
      operationId: admin_downloadAssetFromUrl
      tags: [admin]
      summary: Download an image from an arbitrary URL into the DAM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, format: uri }
                subfolder: { type: string }
                desiredName:
                  type: string
                  maxLength: 200
                  description: |
                    Optional basename (no extension) for the saved file. Server appends
                    the sniffed extension. On collision a ` 2`, ` 3`, … numeric suffix is
                    appended. Used by the internet image-search flows to name downloads
                    after the search term in Title Case (e.g. `Matthew Mercer.jpg`).
                    When omitted, the filename is derived from the source URL (existing
                    behaviour). Path separators and control characters are rejected.
      responses:
        "200":
          description: Downloaded file name
          content:
            application/json:
              schema:
                type: object
                required: [fileName]
                properties:
                  fileName: { type: string }

  /api/backend/assets/{category}/move:
    parameters:
      - $ref: "#/components/parameters/AssetCategory"
    post:
      operationId: admin_moveAsset
      tags: [admin]
      summary: Move or rename an asset — rewrites game references
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from, to]
              properties:
                from: { type: string }
                to: { type: string }
                toCategory: { $ref: "#/components/schemas/AssetCategory" }
      responses:
        "200":
          description: Move result
          content:
            application/json:
              schema:
                type: object
                required: [ok, rewrittenGames]
                properties:
                  ok: { type: boolean }
                  rewrittenGames: { type: integer }

  /api/backend/assets/{category}/hashes:
    parameters:
      - $ref: "#/components/parameters/AssetCategory"
    post:
      operationId: admin_assetHashes
      tags: [admin]
      summary: Compute MD5 hashes for a list of files (used for deduplication)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: Hash map keyed by file path
          content:
            application/json:
              schema:
                type: object
                required: [hashes]
                properties:
                  hashes:
                    type: object
                    additionalProperties: { type: string }

  /api/backend/assets/{category}/merge:
    parameters:
      - $ref: "#/components/parameters/AssetCategory"
    post:
      operationId: admin_mergeAsset
      tags: [admin]
      summary: Merge duplicate assets — keeps one, rewrites refs from the discarded one
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [keep, discard]
              properties:
                keep: { type: string }
                discard: { type: string }
      responses:
        "200":
          description: Merge result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MergeAssetResult" }

  /api/backend/assets/images/search:
    post:
      operationId: admin_searchImages
      tags: [admin]
      summary: Multi-provider image search (DuckDuckGo, Wikimedia Commons)
      description: |
        Runs the query against the free, no-API-key providers in parallel.
        Results are normalised, deduplicated by URL, and sorted by pixel area
        descending. If at least one provider succeeds the response is `200` with
        `partial: true` and a per-provider error map; if every provider fails the
        response is `502`. Each `(query, providers)` tuple is cached for 1 hour.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImageSearchRequest" }
      responses:
        "200":
          description: Image search results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImageSearchResponse" }
        "400":
          description: Invalid query
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImageReplaceError" }
        "502":
          description: All providers failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImageReplaceError" }

  /api/backend/assets/youtube/search:
    post:
      operationId: admin_searchYouTube
      tags: [admin]
      summary: Keyword search YouTube via yt-dlp (metadata only, no download)
      description: |
        Runs a flat `yt-dlp` search (`ytsearchN:<query> --flat-playlist
        --dump-json`) and returns normalised metadata-only results — no media is
        downloaded. Results are **videos only** (channels and playlists that the
        search mixes in are filtered out). The chosen result is downloaded
        afterwards through `POST /api/backend/assets/{category}/youtube-download`.
        `hasMore` is true while the search is not exhausted, paginated via the
        cumulative `page` (the client appends + dedupes). Each
        `(query, limit, page)` tuple is cached for 1 hour. `400` on empty query,
        `502` when yt-dlp fails.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/YouTubeSearchRequest" }
      responses:
        "200":
          description: YouTube search results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/YouTubeSearchResponse" }
        "400":
          description: Invalid query
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImageReplaceError" }
        "502":
          description: yt-dlp search failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImageReplaceError" }

  /api/backend/assets/images/replace:
    post:
      operationId: admin_replaceImage
      tags: [admin]
      summary: Atomically replace the bytes of an existing image
      description: |
        Two request variants share this path:
        - `application/json` — fetch from URL (server unwraps Google/Bing
          image-result redirects and validates magic bytes).
        - `multipart/form-data` — direct upload (drag-and-drop or clipboard paste).
        On success the server backs up the old bytes to
        `local-assets/images/.replace-backups/<basename>.<oldMtimeMs>.<ext>` (last
        5 retained), atomically swaps via `.tmp` + rename, and — if the format
        differs — uses the new extension as the new filename and rewrites every
        game-config reference (same helper as `merge`). Identical bytes return
        `200 { noChange: true }`. Smaller-in-both-dims AND SVG ↔ raster swaps
        both require `force: true` or 409 is returned with the relevant
        directional detail. Concurrent replaces of the same path are serialised.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImageReplaceJsonRequest" }
          multipart/form-data:
            schema: { $ref: "#/components/schemas/ImageReplaceMultipartRequest" }
      responses:
        "200":
          description: Replace result (or no-change marker)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ImageReplaceResult"
                  - $ref: "#/components/schemas/ImageReplaceNoChange"
        "400":
          description: Invalid target or bad image bytes
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImageReplaceError" }
        "409":
          description: |
            Either the new image is smaller in both dimensions, or the format
            switches between SVG and raster. Both cases are recoverable by
            retrying with `force=true`.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ImageReplaceSmallerError"
                  - $ref: "#/components/schemas/ImageReplaceVectorRasterError"
        "502":
          description: URL fetch failed (URL variant only)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImageReplaceError" }

  /api/backend/assets/images/upscale/info:
    get:
      operationId: admin_upscaleInfo
      tags: [admin]
      summary: Probe whether the local-AI upscaler is installed
      description: |
        Reports whether the upscayl-ncnn binary is present for the server's
        current platform, plus the catalog of available models and the
        supported input extensions. Used by the admin UI to gate the
        "AI hochskalieren" tab.
      responses:
        "200":
          description: Upscaler availability + capability descriptor.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UpscaleInfo" }

  /api/backend/assets/images/upscale:
    post:
      operationId: admin_upscaleImage
      tags: [admin]
      summary: Run a local-AI upscale on an existing image — preview or confirm
      description: |
        Runs the upscayl-ncnn binary (Real-ESRGAN) against `target` at the
        chosen `scale` with the chosen `model`. When `dryRun=true`, returns a
        `previewUrl` to fetch the result; when `dryRun=false`, the result
        flows through the same atomic-swap path as `/images/replace` —
        same backup, same broadcast, same cache invalidation.
        Output extension always matches input; `extensionChanged` is always
        `false` and `rewrittenGames` is always `0`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImageUpscaleRequest" }
      responses:
        "200":
          description: Dry-run preview or confirm result.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ImageUpscaleDryRunResult"
                  - $ref: "#/components/schemas/ImageUpscaleConfirmResult"
        "400":
          description: Invalid target, model, scale, or unsupported source format.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImageReplaceError" }
        "500":
          description: Upscaler spawned but failed (timeout, decode error, …).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImageReplaceError" }
        "503":
          description: Upscaler not installed on this server's platform.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImageReplaceError" }

  /api/backend/assets/images/upscale/progress/{progressId}:
    parameters:
      - name: progressId
        in: path
        required: true
        description: UUID generated by the client and passed in the POST body.
        schema:
          type: string
          format: uuid
          pattern: '^[a-fA-F0-9-]{36}$'
    get:
      operationId: admin_upscaleProgress
      tags: [admin]
      summary: Stream upscale progress via Server-Sent Events
      description: |
        Server-Sent Events stream of per-tile upscale progress. Each event is
        a single `data: {"percent": N}\n\n` line where `N` is a float in
        `[0, 100]`. Opens before the matching POST `/upscale` request fires
        and closes when the client disconnects (typically after the POST
        returns). Cache-hit upscales receive no progress events because no
        AI work runs.
      responses:
        "200":
          description: 'SSE stream — `Content-Type: text/event-stream`.'
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  data: {"percent":12.5}

                  data: {"percent":25}

                  data: {"percent":100}

        "400":
          description: Malformed progress id (not a UUID).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImageReplaceError" }

  /api/backend/assets/images/upscale/preview/{cacheKey}:
    parameters:
      - name: cacheKey
        in: path
        required: true
        description: |
          Cache key returned by the dry-run response. Shape:
          `<sha1>-<model>-<2|4>x.<jpg|png|webp>`.
        schema:
          type: string
          pattern: '^[a-f0-9]{40}-(ultramix_balanced|ultrasharp|digital_art)-(1\.5|2|3|4)x\.(jpg|png|webp)$'
    get:
      operationId: admin_upscalePreview
      tags: [admin]
      summary: Stream a cached upscaled preview
      description: |
        Returns the raw bytes of a previously-generated dry-run preview. The
        cache is in-memory only and cleared on Node restart — 404 after a
        restart means the client must re-run the dry-run.
      responses:
        "200":
          description: Cached preview bytes.
          content:
            image/jpeg: { schema: { type: string, format: binary } }
            image/png:  { schema: { type: string, format: binary } }
            image/webp: { schema: { type: string, format: binary } }
        "400":
          description: Malformed cache key.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImageReplaceError" }
        "404":
          description: Cache miss — likely cleared by a Node restart.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImageReplaceError" }

  /api/backend/assets/{category}/mkdir:
    parameters:
      - $ref: "#/components/parameters/AssetCategory"
    post:
      operationId: admin_createAssetFolder
      tags: [admin]
      summary: Create a subfolder under a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [folderPath]
              properties:
                folderPath: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Ok" }

  /api/backend/assets/{category}/{splat}:
    parameters:
      - $ref: "#/components/parameters/AssetCategory"
      - name: splat
        in: path
        required: true
        description: The rest-path (including subfolder) of the file to delete
        schema: { type: string }
      - name: batchId
        in: query
        required: false
        description: Group multiple deletes into one undoable batch
        schema: { type: string }
    delete:
      operationId: admin_deleteAsset
      tags: [admin]
      summary: Soft-delete an asset (moves to `.trash/<batchId>/`)
      responses:
        "200": { $ref: "#/components/responses/Ok" }

  /api/backend/assets/undo-delete:
    post:
      operationId: admin_undoDelete
      tags: [admin]
      summary: Restore the most recent trash batch
      responses:
        "200":
          description: Undo result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UndoDeleteResult" }

  /api/backend/assets/{category}/trash:
    parameters:
      - $ref: "#/components/parameters/AssetCategory"
    get:
      operationId: admin_listTrash
      tags: [admin]
      summary: List every soft-delete batch surviving in `<category>/.trash/`.
      description: |
        Backs the DAM Papierkorb view. Entries are at the same granularity as the
        original soft-delete (folders stay as a single `isDirectory: true` row).
        Missing `.trash` directory returns `{ batches: [] }`.
      responses:
        "200":
          description: Trash listing
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TrashListResponse" }

  /api/backend/assets/{category}/trash/all:
    parameters:
      - $ref: "#/components/parameters/AssetCategory"
    get:
      operationId: admin_listTrashAll
      tags: [admin]
      summary: Flat deep listing of every trashed file across every batch.
      description: |
        Backs the Papierkorb search. Walks every surviving `.trash/<batchId>/`
        directory recursively and emits every leaf file (directories are not
        emitted). Each entry carries the batch metadata (`batchId`,
        `batchCreatedAt`, `batchExpiresAt`) inline so the UI can render
        per-row "gelöscht vor X" / "läuft ab in X" labels without joining
        against the `/trash` response. Missing `.trash` directory returns
        `{ entries: [] }`.
      responses:
        "200":
          description: Flat list of every trashed file
          content:
            application/json:
              schema:
                type: object
                required: [entries]
                properties:
                  entries:
                    type: array
                    items: { $ref: "#/components/schemas/TrashDeepEntry" }

  /api/backend/assets/{category}/trash/list:
    parameters:
      - $ref: "#/components/parameters/AssetCategory"
    get:
      operationId: admin_listTrashChildren
      tags: [admin]
      summary: Direct children of a path inside a trash batch (folder navigation).
      description: |
        Lazy-loads the contents of a single folder inside `<category>/.trash/<batchId>/`.
        Unlike `GET /trash`, this endpoint does NOT collapse single-child folders —
        the caller sees the actual on-disk structure so users can drill into a
        trashed folder and act on individual files. Returns `[]` when the path
        is missing or not a directory.
      parameters:
        - name: batchId
          in: query
          required: true
          schema: { type: string }
        - name: path
          in: query
          required: true
          description: Folder path inside the batch (empty string = batch root).
          schema: { type: string }
      responses:
        "200":
          description: Direct children of the requested path
          content:
            application/json:
              schema:
                type: object
                required: [entries]
                properties:
                  entries:
                    type: array
                    items: { $ref: "#/components/schemas/TrashEntry" }
        "400":
          description: Invalid `batchId` or `path`

  /api/backend/assets/{category}/trash/restore:
    parameters:
      - $ref: "#/components/parameters/AssetCategory"
    post:
      operationId: admin_restoreTrash
      tags: [admin]
      summary: Restore selected items from a trash batch.
      description: |
        Renames each `items` entry from `<category>/.trash/<batchId>/<originalPath>`
        back to `<category>/<originalPath>`. `items` may be top-level entries OR
        nested paths inside a soft-deleted folder; the only constraint is that
        `<batchDir>/<item>` exists. Skips entries whose original path is already
        occupied; those are returned in `conflicts`. Omit `items` to restore
        every top-level entry in the batch.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [batchId]
              properties:
                batchId: { type: string }
                items:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: Restore result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TrashRestoreResult" }

  /api/backend/assets/{category}/trash/purge:
    parameters:
      - $ref: "#/components/parameters/AssetCategory"
    post:
      operationId: admin_purgeTrash
      tags: [admin]
      summary: Permanently delete trash entries (no undo).
      description: |
        Three modes determined by the body:
        - `{}` empties every batch for the category.
        - `{ batchId }` purges the whole batch.
        - `{ batchId, items }` purges the listed paths from that batch. `items`
          may be top-level entries OR nested paths inside a soft-deleted folder.

        For each removed entry the deferred NAS delete is queued. For the audio
        category, the derived cover at `/images/Audio-Covers/{basename}.jpg` and
        its sidecar meta entry are also removed. Overlapping entries in the
        in-memory `lastDeletion` pointer are filtered out so a stale undo toast
        cannot 404.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                batchId: { type: string }
                items:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: Purge result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TrashPurgeResult" }

  /api/backend/assets/{category}/trash/stream:
    parameters:
      - $ref: "#/components/parameters/AssetCategory"
    get:
      operationId: admin_streamTrashFile
      tags: [admin]
      summary: Stream the bytes of a single trashed file (for preview modals).
      description: |
        `express.static` for `/images/`, `/audio/`, `/background-music/`, `/videos/`
        is configured with `dotfiles: 'ignore'`, so trashed files cannot be served
        through those mounts. This endpoint resolves `<category>/.trash/<batchId>/<path>`
        and returns the bytes with `Cache-Control: no-store`. Strict path validation
        rejects `..`, NUL bytes, dot-prefixed segments, and `batchId`s outside the
        `^[a-zA-Z0-9_-]{6,64}$` shape.
      parameters:
        - name: batchId
          in: query
          required: true
          schema: { type: string }
        - name: path
          in: query
          required: true
          description: originalPath of the file inside the batch
          schema: { type: string }
      responses:
        "200":
          description: Raw file bytes
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "400":
          description: Invalid `batchId` or `path`
        "404":
          description: Trash entry not found or not a regular file

  /api/backend/color-profile:
    get:
      operationId: admin_getColorProfile
      tags: [admin]
      summary: Get the cached color profile for an image (used by the colorguess question editor preview).
      parameters:
        - name: image
          in: query
          required: true
          description: |
            Absolute `/images/...` path or image-relative path. A leading `/images/` is stripped before
            the server looks up the profile. Returns an empty `colors` array when the file is missing.
          schema: { type: string }
      responses:
        "200":
          description: Color profile for the image
          content:
            application/json:
              schema:
                type: object
                required: [colors]
                properties:
                  colors:
                    type: array
                    items: { $ref: "#/components/schemas/ColorSlice" }
        "400":
          description: Missing or invalid `image` parameter
        "500":
          description: Profile extraction failed

  /api/backend/asset-usages:
    get:
      operationId: admin_getAssetUsages
      tags: [admin]
      summary: Which games reference this asset?
      parameters:
        - name: category
          in: query
          required: true
          schema: { $ref: "#/components/schemas/AssetCategory" }
        - name: file
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Games referencing the asset
          content:
            application/json:
              schema:
                type: object
                required: [games]
                properties:
                  games:
                    type: array
                    items: { $ref: "#/components/schemas/AssetUsage" }

  /api/backend/asset-usages-bulk:
    post:
      operationId: admin_getAssetUsagesBulk
      tags: [admin]
      summary: Which games reference any of these files? (bulk variant of asset-usages)
      description: |
        Single-call alternative to looping `asset-usages` per file. Reads each game JSON
        once and substring-matches every supplied path against it in one pass. Used by
        the DAM delete-confirm modal when the user multi-selects files — the per-file
        GET fan-out was both slow (N × all-game-JSONs reads) and silently capped at
        50 files, hiding usage warnings for larger selections.

        If `files.length` exceeds the server's batch cap (currently 5000), the response
        sets `truncated: true` and `files` is empty — the caller should fall back to a
        generic "usage check skipped" warning.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category, files]
              properties:
                category: { $ref: "#/components/schemas/AssetCategory" }
                files:
                  type: array
                  description: Paths relative to the category root, e.g. `audio-2024/song.mp3`.
                  items: { type: string }
      responses:
        "200":
          description: Game references aggregated per supplied file
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssetFolderUsages" }
        "400":
          description: Invalid file path in the request

  /api/backend/asset-folder-usages:
    get:
      operationId: admin_getAssetFolderUsages
      tags: [admin]
      summary: Which games reference any file inside this folder?
      description: |
        Recursively walks the folder server-side and matches every contained file against every
        game JSON in one pass. Used by the DAM delete-confirmation modal to warn the user when
        a folder being deleted contains files referenced by games.

        If the folder contains more than the server's file cap (currently 5000 files), the
        response sets `truncated: true` and `files` is empty — the caller should fall back to
        a generic "usage check skipped" warning.
      parameters:
        - name: category
          in: query
          required: true
          schema: { $ref: "#/components/schemas/AssetCategory" }
        - name: folder
          in: query
          required: true
          description: Folder path relative to the category root, e.g. `audio-2024/sub`.
          schema: { type: string }
      responses:
        "200":
          description: Game references aggregated per file inside the folder
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssetFolderUsages" }

  /api/backend/asset-category-usages:
    get:
      operationId: admin_getAssetCategoryUsages
      tags: [admin]
      summary: Which files in this category are referenced by any game?
      description: |
        Walks the whole category root once and returns the set of file paths that appear
        in any game JSON. Used by the DAM "Verwendet / Unbenutzt" filter to hide files
        based on whether they are referenced by a game.

        If the category contains more than the server's file cap (currently 5000 files), the
        response sets `truncated: true` and `usedFiles` is empty — the caller should disable
        the filter and surface a generic notice.
      parameters:
        - name: category
          in: query
          required: true
          schema: { $ref: "#/components/schemas/AssetCategory" }
      responses:
        "200":
          description: Set of category-relative file paths used in any game
          content:
            application/json:
