      responses:
        "200": { $ref: "#/components/responses/Ok" }

  /api/backend/audio-cover-confirm/{jobId}/{fileIndex}:
    parameters:
      - { name: jobId, in: path, required: true, schema: { type: string } }
      - { name: fileIndex, in: path, required: true, schema: { type: integer } }
