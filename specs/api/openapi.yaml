          content:
            application/json:
              schema:
                type: object
                required: [job]
                properties:
                  job: { $ref: "#/components/schemas/WhisperJob" }

# ───────────────────────────────────────────────────────────────────────────
# Components — shared parameters, responses, schemas
# ───────────────────────────────────────────────────────────────────────────

components:

  parameters:
    AssetCategory:
      name: category
      in: path
      required: true
      schema: { $ref: "#/components/schemas/AssetCategory" }
    GameFileName:
      name: fileName
      in: path
      required: true
      description: Game slug (file name without `.json`)
      schema: { type: string }
    VideoStart:
      name: start
      in: path
      required: true
      schema: { type: number }
    VideoEnd:
      name: end
      in: path
      required: true
      schema: { type: number }
    VideoSplat:
      name: splat
      in: path
      required: true
      description: Asset-relative video path (with slashes)
      schema: { type: string }

  responses:
    Ok:
      description: Successful empty-ish ack
      content:
        application/json:
          schema: { $ref: "#/components/schemas/OkResponse" }
    NotFound:
      description: Target not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

  schemas:

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, const: true }

    GameDeletionResult:
      type: object
      required: [success, removedRefs]
      description: >
        Result of deleting a game or instance. `removedRefs` lists every gameOrder reference
        removed from config.json as a side effect, so the admin can report the cleanup.
      properties:
        success: { type: boolean, const: true }
        removedRefs:
          type: array
          items:
            type: object
            required: [gameshow, ref]
            properties:
              gameshow:
                type: string
                description: Key of the gameshow whose gameOrder the ref was removed from.
              ref:
                type: string
                description: The removed gameOrder entry (e.g. "allgemeinwissen/v1").

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }

    AudioCoverMetaEntry:
      type: object
      required: [source, setAt]
      description: Provenance record for a single audio cover at `/images/Audio-Covers/{basename}.jpg`.
      properties:
        source:
          type: string
          enum: [youtube, itunes, musicbrainz, manual, auto]
        setAt:
          type: number
          description: Epoch ms when the cover was last written.
        origin:
          type: object
          properties:
            pickedFrom:
              type: string
              description: Image path the cover bytes were copied from (for `manual`).

    CacheMode:
      type: string
      enum: [balanced, max]
      description: |
        Background-encoding priority mode.
        - `balanced` (default): utility QoS / nice 19, `BG_ENCODE_CONCURRENCY = 1`.
          File serving always wins.
        - `max`: no priority demotion, `BG_ENCODE_CONCURRENCY = 4`. Opt-in for
          prep windows where the operator wants maximum throughput.

    CacheModeResponse:
      type: object
      required: [mode]
      properties:
        mode: { $ref: "#/components/schemas/CacheMode" }

    # ─── Domain types (mirror src/types/config.ts) ───

    AssetCategory:
      type: string
      enum: [audio, images, background-music, videos]

    GameType:
      type: string
      enum: [simple-quiz, bet-quiz, guessing-game, final-quiz, audio-guess,
             video-guess, q1, four-statements, fact-or-fake, quizjagd, bandle,
             image-guess, colorguess, ranking]

    SettingsResponse:
      type: object
      required: [pointSystemEnabled, teamRandomizationEnabled, globalRules]
      properties:
        pointSystemEnabled: { type: boolean }
        teamRandomizationEnabled: { type: boolean }
        globalRules: { type: array, items: { type: string } }
        isCleanInstall: { type: boolean }
        enabledJokers: { type: array, items: { type: string } }

    ThemeSettings:
      type: object
      required: [frontend, admin]
      properties:
        frontend: { type: string }
        admin: { type: string }

    ThemeSettingsPartial:
      type: object
      properties:
        frontend: { type: string }
        admin: { type: string }

    GameDataResponse:
      type: object
      required: [gameId, config, currentIndex, totalGames, pointSystemEnabled]
      properties:
        gameId: { type: string }
        config: { $ref: "#/components/schemas/GameConfig" }
        currentIndex: { type: integer }
        totalGames: { type: integer }
        pointSystemEnabled: { type: boolean }

    AppConfig:
      type: object
      required: [activeGameshow, gameshows]
      properties:
        pointSystemEnabled: { type: boolean }
        teamRandomizationEnabled: { type: boolean }
        globalRules: { type: array, items: { type: string } }
        rulesPresets:
          type: array
          items: { $ref: "#/components/schemas/RulesPreset" }
          description: |
            Named rule presets referenced from `BaseGameConfig.rulesPreset`. The
            admin rules editor renders one button per preset; the server resolves
            references inline before serving game data. See
            [specs/rules-presets.md](../rules-presets.md).
        activeGameshow: { type: string }
        gameshows:
          type: object
          additionalProperties: { $ref: "#/components/schemas/GameshowConfig" }

    RulesPreset:
      type: object
      required: [id, name, rules]
      properties:
        id:
          type: string
          description: Stable slug referenced from `BaseGameConfig.rulesPreset`.
        name:
          type: string
          description: German button label rendered in the admin rules editor.
        rules:
          type: array
          items: { type: string }
          description: Archetype lines that follow the game-specific task line on resolution.

    GameshowConfig:
      type: object
      required: [name, gameOrder]
      properties:
        name: { type: string }
        gameOrder: { type: array, items: { type: string } }
        players: { type: array, items: { type: string } }
        enabledJokers: { type: array, items: { type: string } }

    GameFileSummary:
      type: object
      required: [fileName, type, title, instances, isSingleInstance]
      properties:
        fileName: { type: string }
        type: { $ref: "#/components/schemas/GameType" }
        title: { type: string }
        instances:
          type: array
          items: { type: string }
          description: |
            Selectable instance keys for the gameshow editor. Excludes `archive`
            unless every other instance is empty (no questions) — in that case
            the archive is appended so the user still has something to pick.
        isSingleInstance: { type: boolean }
        instancePlayers:
          type: object
          additionalProperties: { type: array, items: { type: string } }
        parseError: { type: string }

    BaseGameConfig:
      type: object
      required: [type, title]
      properties:
        type: { $ref: "#/components/schemas/GameType" }
        title: { type: string }
        rules: { type: array, items: { type: string } }
        rulesPreset:
          type: string
          description: |
            Optional reference to a preset id in `AppConfig.rulesPresets`. The server
            resolves this into a flat `rules` array before responding, so clients
            consuming `GET /api/game/:index` never observe this field. The admin
            CMS does observe it (via `GET /api/backend/games/:fileName`) so the
            rules editor can render its linked-mode UI. See
            [specs/rules-presets.md](../rules-presets.md).
        randomizeQuestions: { type: boolean }
        questionLimit: { type: integer }
        theme: { type: string }

    GameConfig:
      description: Union of every game type. Discriminated on `type`.
      oneOf:
        - $ref: "#/components/schemas/SimpleQuizConfig"
        - $ref: "#/components/schemas/BetQuizConfig"
        - $ref: "#/components/schemas/GuessingGameConfig"
        - $ref: "#/components/schemas/FinalQuizConfig"
        - $ref: "#/components/schemas/AudioGuessConfig"
        - $ref: "#/components/schemas/VideoGuessConfig"
        - $ref: "#/components/schemas/Q1Config"
        - $ref: "#/components/schemas/FourStatementsConfig"
        - $ref: "#/components/schemas/FactOrFakeConfig"
        - $ref: "#/components/schemas/QuizjagdConfig"
        - $ref: "#/components/schemas/BandleConfig"
        - $ref: "#/components/schemas/ImageGuessConfig"
        - $ref: "#/components/schemas/ColorGuessConfig"
        - $ref: "#/components/schemas/RankingConfig"
      discriminator:
        propertyName: type

    SimpleQuizConfig:
      allOf:
        - $ref: "#/components/schemas/BaseGameConfig"
        - type: object
          required: [type, questions]
          properties:
            type: { const: simple-quiz }
            questions:
              type: array
              items: { $ref: "#/components/schemas/SimpleQuizQuestion" }

    BetQuizConfig:
      allOf:
        - $ref: "#/components/schemas/BaseGameConfig"
        - type: object
          required: [type, questions]
          properties:
            type: { const: bet-quiz }
            questions:
              type: array
              items: { $ref: "#/components/schemas/SimpleQuizQuestion" }

    GuessingGameConfig:
      allOf:
        - $ref: "#/components/schemas/BaseGameConfig"
        - type: object
          required: [type, questions]
          properties:
            type: { const: guessing-game }
            questions:
              type: array
              items: { $ref: "#/components/schemas/GuessingGameQuestion" }

    FinalQuizConfig:
      allOf:
        - $ref: "#/components/schemas/BaseGameConfig"
        - type: object
          required: [type, questions]
          properties:
            type: { const: final-quiz }
            questions:
              type: array
              items: { $ref: "#/components/schemas/FinalQuizQuestion" }

    AudioGuessConfig:
      allOf:
        - $ref: "#/components/schemas/BaseGameConfig"
        - type: object
          required: [type, questions]
          properties:
            type: { const: audio-guess }
            questions:
              type: array
              items: { $ref: "#/components/schemas/AudioGuessQuestion" }

    VideoGuessConfig:
      allOf:
        - $ref: "#/components/schemas/BaseGameConfig"
        - type: object
          required: [type, questions]
          properties:
            type: { const: video-guess }
            questions:
              type: array
              items: { $ref: "#/components/schemas/VideoGuessQuestion" }
            language: { type: string, description: "ISO 639-2 default audio language" }
            locked: { type: boolean }

    Q1Config:
      allOf:
        - $ref: "#/components/schemas/BaseGameConfig"
        - type: object
          required: [type, questions]
          properties:
            type: { const: q1 }
            questions:
              type: array
              items: { $ref: "#/components/schemas/Q1Question" }

    FourStatementsConfig:
      allOf:
        - $ref: "#/components/schemas/BaseGameConfig"
        - type: object
          required: [type, questions]
          properties:
            type: { const: four-statements }
            questions:
              type: array
              items: { $ref: "#/components/schemas/FourStatementsQuestion" }

    FactOrFakeConfig:
      allOf:
        - $ref: "#/components/schemas/BaseGameConfig"
        - type: object
          required: [type, questions]
          properties:
            type: { const: fact-or-fake }
            questions:
              type: array
              items: { $ref: "#/components/schemas/FactOrFakeQuestion" }

    QuizjagdConfig:
      allOf:
        - $ref: "#/components/schemas/BaseGameConfig"
        - type: object
          required: [type, questions]
          properties:
            type: { const: quizjagd }
            questions: { $ref: "#/components/schemas/QuizjagdQuestionSet" }
            questionsPerTeam: { type: integer }
            exampleQuestion: { $ref: "#/components/schemas/QuizjagdQuestion" }

    BandleConfig:
      allOf:
        - $ref: "#/components/schemas/BaseGameConfig"
        - type: object
          required: [type, questions]
          properties:
            type: { const: bandle }
            questions:
              type: array
              items: { $ref: "#/components/schemas/BandleQuestion" }

    ImageGuessConfig:
      allOf:
        - $ref: "#/components/schemas/BaseGameConfig"
        - type: object
          required: [type, questions]
          properties:
            type: { const: image-guess }
            questions:
              type: array
              items: { $ref: "#/components/schemas/ImageGuessQuestion" }

    ColorGuessConfig:
      allOf:
        - $ref: "#/components/schemas/BaseGameConfig"
        - type: object
          required: [type, questions]
          properties:
            type: { const: colorguess }
            questions:
              type: array
              items: { $ref: "#/components/schemas/ColorGuessQuestion" }

    RankingConfig:
      allOf:
        - $ref: "#/components/schemas/BaseGameConfig"
        - type: object
          required: [type, questions]
          properties:
            type: { const: ranking }
            questions:
              type: array
              items: { $ref: "#/components/schemas/RankingQuestion" }

    MultiInstanceGameFile:
      type: object
      required: [type, title, instances]
      properties:
        type: { $ref: "#/components/schemas/GameType" }
        title: { type: string }
        rules: { type: array, items: { type: string } }
        randomizeQuestions: { type: boolean }
        instances:
          type: object
          additionalProperties:
            description: Partial<GameConfig> — overrides/extends the base fields
            type: object

    # ─── Question types ───

    SimpleQuizQuestion:
      type: object
      required: [question, answer]
      properties:
        question: { type: string }
        answer: { type: string }
        info: { type: string, description: "Optional subtitle shown in small font above the question text (simple-quiz only)." }
        category: { type: string }
        answerImage: { type: string }
        answerAudio: { type: string }
        answerAudioStart: { type: number }
        answerAudioEnd: { type: number }
        answerAudioLoop: { type: boolean }
        answerList: { type: array, items: { type: string } }
        questionImage: { type: string }
        questionAudio: { type: string }
        questionAudioStart: { type: number }
        questionAudioEnd: { type: number }
        questionAudioLoop: { type: boolean }
        questionColors: { type: array, items: { type: string } }
        replaceImage: { type: boolean }
        timer: { type: number }
        disabled: { type: boolean }

    GuessingGameQuestion:
      type: object
      required: [question, answer]
      properties:
        question: { type: string }
        answer: { type: number }
        answerImage: { type: string }
        disabled: { type: boolean }

    FinalQuizQuestion:
      type: object
      required: [question, answer]
      properties:
        question: { type: string }
        answer: { type: string }
        answerImage: { type: string }
        disabled: { type: boolean }

    AudioGuessQuestion:
      type: object
      required: [answer, audio]
      properties:
        answer: { type: string }
        audio: { type: string }
        audioStart: { type: number }
        audioEnd: { type: number }
        answerImage: { type: string }
        isExample: { type: boolean }
        disabled: { type: boolean }

    BandleTrack:
      type: object
      required: [label, audio]
      properties:
        label: { type: string }
        audio: { type: string }

    BandleQuestion:
      type: object
      required: [answer, tracks]
      properties:
        answer: { type: string }
        tracks:
          type: array
          items: { $ref: "#/components/schemas/BandleTrack" }
        hint: { type: string }
        hintEnabled: { type: boolean }
        answerImage: { type: string }
        releaseYear: { type: integer }
        clicks: { type: integer }
        difficulty: { type: number }
        isExample: { type: boolean }
        disabled: { type: boolean }

    BandleCatalogEntry:
      type: object
      required: [path, song, year, par, view, genre, packs, instruments]
      properties:
        path: { type: string }
        song: { type: string }
        year: { type: integer }
        par: { type: integer }
        view: { type: integer }
        genre: { type: array, items: { type: string } }
        packs: { type: array, items: { type: string } }
        instruments: { type: array, items: { type: string } }
        clue: { type: string }
        bpm: { type: number }
        youtube: { type: string }
        spotifyId: { type: string }
        stream: { type: number }
        frontperson: { type: string }
        sources: { type: array, items: { type: string } }

    VideoGuessQuestion:
      type: object
      required: [answer, video]
      properties:
        answer: { type: string }
        video: { type: string }
        videoStart: { type: number }
        videoQuestionEnd: { type: number }
        videoAnswerEnd: { type: number }
        answerImage: { type: string }
        audioTrack: { type: integer }
        disabled: { type: boolean }

    ImageGuessQuestion:
      type: object
      required: [image, answer]
      properties:
        image: { type: string }
        answer: { type: string }
        obfuscation:
          type: string
          enum: [blur, pixelate, zoom, swirl, noise, scatter, random]
        duration: { type: number }
        disabled: { type: boolean }

    ColorSlice:
      description: A single wedge in a colorguess pie chart.
      type: object
      required: [hex, percent]
      properties:
        hex:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        percent:
          type: number
          minimum: 0
          maximum: 100

    ColorGuessQuestion:
      description: |
        Authored as `{ image, answer }` only. The server populates `colors`
        from the sidecar color-profile cache when serving /api/game/:index.
      type: object
      required: [image, answer]
      properties:
        image: { type: string }
        answer: { type: string }
        disabled: { type: boolean }
        colors:
          description: Populated server-side; never present in authored JSON.
          type: array
          items: { $ref: "#/components/schemas/ColorSlice" }

    Q1Question:
      type: object
      required: [Frage, trueStatements, wrongStatement]
      properties:
        Frage: { type: string }
        trueStatements: { type: array, items: { type: string } }
        wrongStatement: { type: string }
        answer: { type: string }
        disabled: { type: boolean }

    FourStatementsQuestion:
      type: object
      required: [topic, statements]
      properties:
        topic: { type: string }
        statements: { type: array, items: { type: string } }
        answer: { type: string }
        answerImage: { type: string }
        disabled: { type: boolean }

    RankingQuestion:
      type: object
      required: [question, answers]
      properties:
        question: { type: string }
        answers: { type: array, items: { type: string } }
        topic: { type: string }
        disabled: { type: boolean }

    FactOrFakeQuestion:
      type: object
      required: [statement, description]
      properties:
        statement: { type: string }
        answer: { type: string, enum: [FAKT, FAKE] }
        isFact: { type: boolean }
        description: { type: string }
        questionImage: { type: string, description: "Optional image rendered alongside the statement during the question phase." }
        answerImage: { type: string, description: "Optional image rendered below the description in the reveal phase (e.g. a map showing the answer)." }
        disabled: { type: boolean }

    QuizjagdQuestionSet:
      type: object
      required: [easy, medium, hard]
      properties:
        easy: { type: array, items: { $ref: "#/components/schemas/QuizjagdQuestion" } }
        medium: { type: array, items: { $ref: "#/components/schemas/QuizjagdQuestion" } }
        hard: { type: array, items: { $ref: "#/components/schemas/QuizjagdQuestion" } }

    QuizjagdQuestion:
      type: object
      required: [question, answer]
      properties:
        question: { type: string }
        answer: { type: string }
        difficulty: { type: integer, enum: [3, 5, 7] }
        disabled: { type: boolean }

    # ─── Asset types ───

    AssetFileMeta:
      type: object
      required: [size, mtime]
      properties:
        size: { type: integer }
        mtime: { type: number }
        duration: { type: number }
        reference:
          type: object
          required: [sourcePath, online]
          properties:
            sourcePath: { type: string }
            online: { type: boolean }
        dimensions:
          type: object
          description: |
            Natural pixel dimensions of a raster image (`images` category only). Absent for
            SVGs (vector — treated as "high resolution") and non-image categories. Backs the
            DAM "Niedrige Auflösung" filter and "Auflösung" sort.
          required: [width, height]
          properties:
            width: { type: integer, minimum: 1 }
            height: { type: integer, minimum: 1 }

    AssetFolder:
      type: object
      required: [name, files, subfolders]
      properties:
        name: { type: string }
        files: { type: array, items: { type: string } }
        fileMeta:
          type: object
          additionalProperties: { $ref: "#/components/schemas/AssetFileMeta" }
        subfolders:
          type: array
          items: { $ref: "#/components/schemas/AssetFolder" }

    AssetListResponse:
      type: object
      properties:
        files: { type: array, items: { type: string } }
        fileMeta:
          type: object
          additionalProperties: { $ref: "#/components/schemas/AssetFileMeta" }
        subfolders:
          type: array
          items: { $ref: "#/components/schemas/AssetFolder" }

    ImageDimensionsResponse:
      type: object
      required: [dimensions]
      properties:
        dimensions:
          type: object
          description: |
            Map of category-relative path → natural pixel dimensions. Only raster image
            formats are included (PNG, JPG, JPEG, WEBP, GIF, AVIF); SVGs are skipped
            because they scale infinitely. Returns `{}` for non-`images` categories.
          additionalProperties:
            type: object
            required: [width, height]
            properties:
              width: { type: integer, minimum: 1 }
              height: { type: integer, minimum: 1 }

    AssetUsage:
      type: object
      required: [fileName, title]
      properties:
        fileName: { type: string }
        title: { type: string }
        instance: { type: string }
        markers:
          type: array
          items:
            type: object
            properties:
              start: { type: number }
              end: { type: number }
        questionIndices:
          type: array
          items: { type: integer }

    AssetFolderUsages:
      type: object
      required: [truncated, files]
      properties:
        truncated:
          type: boolean
          description: True when the folder exceeded the file cap and was not scanned.
        files:
          type: array
          items:
            type: object
            required: [file, games]
            properties:
              file:
                type: string
                description: Path relative to the category root, e.g. `audio-2024/song.mp3`.
              games:
                type: array
                items: { $ref: "#/components/schemas/AssetUsage" }

    AssetCategoryUsages:
      type: object
      required: [truncated, usedFiles, imageGuessFiles]
      properties:
        truncated:
          type: boolean
          description: True when the category exceeded the file cap and was not scanned.
        usedFiles:
          type: array
          description: Category-relative paths of files referenced by any game, e.g. `audio-2024/song.mp3`.
          items: { type: string }
        imageGuessFiles:
          type: array
          description: |
            Subset of `usedFiles` referenced by any `image-guess`-typed game. Always present
            (empty array for non-image categories). Backs the per-usage threshold of the DAM
            "Niedrige Auflösung" filter — image-guess images are rendered at 1920×648 on the
            projector, every other game at 1920×540.
          items: { type: string }

    MergeAssetResult:
      type: object
      required: [success, rewrittenGames]
      properties:
        success: { const: true }
        rewrittenGames: { type: integer }
        cascadedCover:
          type: object
          required: [keep, discard]
          properties:
            keep: { type: string }
            discard: { type: string }

    # ─── Image search + replace ───

    SvgManifestId:
      type: string
      enum: [gilbarbara, detain, simple-icons]
      description: |
        Identifier for one of the public-logo SVG repos indexed by the
        `github-svg` image-search provider. See `/api/backend/system/svg-manifests`.

    SvgManifestStatus:
      type: object
      required: [id, label, count, builtAt, sizeBytes, stale]
      properties:
        id: { $ref: "#/components/schemas/SvgManifestId" }
        label: { type: string, description: "Human-readable repo name." }
        count: { type: integer, description: "Number of SVG entries in the manifest. 0 means not loaded." }
        builtAt:
          type: [integer, "null"]
          description: "Epoch milliseconds when the manifest was last built. Null if never built."
        sizeBytes: { type: integer, description: "On-disk size of the cached manifest file." }
        stale: { type: boolean, description: "True when the manifest is missing or older than 30 days." }

    ImageSearchProvider:
      type: string
      enum: [ddg, commons, github-svg]
      description: |
        Free, no-API-key providers. `ddg` = DuckDuckGo Images,
        `commons` = Wikimedia Commons, `github-svg` = SVG logos indexed
        from gilbarbara/logos, detain/svg-logos, and simple-icons (served
        from `raw.githubusercontent.com`).

    ImageSearchRequest:
      type: object
      required: [query]
      properties:
        query: { type: string, minLength: 1 }
        limit: { type: integer, minimum: 1, maximum: 100, default: 30 }
        page:
          type: integer
          minimum: 1
          default: 1
          description: 1-based page number for paginated results (backs the DAM "Mehr laden" button).
        providers:
          type: array
          items: { $ref: "#/components/schemas/ImageSearchProvider" }

    ImageSearchResult:
      type: object
      required: [url, source]
      properties:
        url: { type: string, format: uri }
        thumbnailUrl: { type: string, format: uri }
        width: { type: integer }
        height: { type: integer }
        source: { $ref: "#/components/schemas/ImageSearchProvider" }
        title: { type: string }
        license: { type: string }

    ImageSearchResponse:
      type: object
      required: [results, partial, page, hasMore]
      properties:
        results:
          type: array
          items: { $ref: "#/components/schemas/ImageSearchResult" }
        partial:
          type: boolean
          description: True iff at least one provider failed while another succeeded.
        page:
          type: integer
          minimum: 1
          description: Echo of the requested page (1-based).
        hasMore:
          type: boolean
          description: True when at least one provider returned a full page; backs the "Mehr laden" affordance.
        errors:
          type: object
          additionalProperties: { type: string }
          description: Per-provider error message when `partial` is true.

    ImageReplaceJsonRequest:
      type: object
      required: [target, url]
      properties:
        target:
          type: string
          description: Category-relative path of the image to replace (e.g. `Logos/foo.png`).
        url: { type: string, format: uri }
        force:
          type: boolean
          description: Bypass the smaller-in-both-dims guard and the SVG↔raster guard.
        dryRun:
          type: boolean
          description: Validate and return the would-be result without writing bytes.

    ImageReplaceMultipartRequest:
      type: object
      required: [target, file]
      properties:
        target: { type: string }
        file: { type: string, format: binary }
        force: { type: boolean }
        dryRun: { type: boolean }

    ImageReplaceResult:
      type: object
      required: [success, target, newFilename, newDims, oldSize, newSize, extensionChanged, rewrittenGames, backupPath, version]
      properties:
        success: { const: true }
        target: { type: string }
        newFilename:
          type: string
          description: |
            New category-relative filename. Equals `target` unless the file format
            changed (in which case the extension differs and game refs were rewritten).
        oldDims:
          type: object
          required: [w, h]
          properties:
            w: { type: integer }
            h: { type: integer }
        newDims:
          type: object
          required: [w, h]
          properties:
            w: { type: integer }
            h: { type: integer }
        oldSize: { type: integer }
        newSize: { type: integer }
        extensionChanged: { type: boolean }
        rewrittenGames:
          type: integer
          description: Number of `games/*.json` files rewritten (0 unless extension changed).
        backupPath:
          type: string
          description: Path of the saved backup under `local-assets/images/.replace-backups/`.
        version:
          type: number
          description: New file mtime in ms — used by the client for cache-busting.

    ImageReplaceNoChange:
      type: object
      required: [noChange]
      properties:
        noChange: { const: true }

    ImageReplaceError:
      type: object
      required: [error]
      properties:
        error: { type: string }
        message: { type: string }

    ImageReplaceSmallerError:
      type: object
      required: [error, oldDims, newDims]
      properties:
        error: { const: smaller }
        oldDims:
          type: object
          required: [w, h]
          properties:
            w: { type: integer }
            h: { type: integer }
        newDims:
          type: object
          required: [w, h]
          properties:
            w: { type: integer }
            h: { type: integer }

    ImageReplaceVectorRasterError:
      type: object
      required: [error, oldExt, newExt]
      properties:
        error: { const: vector_raster_mismatch }
        oldExt:
          type: string
          description: The target file's current extension (e.g. `.png`).
        newExt:
          type: string
          description: The new image's sniffed extension (e.g. `.svg`).

    # ─── Local-AI upscaler ───

    UpscaleInfo:
      type: object
      required: [available, models, scales, supportedExts]
      properties:
        available:
          type: boolean
          description: |
            `true` when the upscayl-ncnn binary is present at
            `local-assets/.upscaler/<platform>-<arch>/upscayl-bin`. `false`
            means the admin UI should show the install hint and disable the
            "Vorschau erstellen" button.
        models:
          type: array
          items:
            type: string
            enum: [ultramix_balanced, ultrasharp, digital_art]
        scales:
          type: array
          items:
            type: number
            enum: [1.5, 2, 3, 4]
        supportedExts:
          type: array
          items:
            type: string
            enum: [.jpg, .jpeg, .png, .webp]

    ImageUpscaleRequest:
      type: object
      required: [target, model, scale]
      properties:
        target:
          type: string
          description: Category-relative path to the image under `images/`.
        model:
          type: string
          enum: [ultramix_balanced, ultrasharp, digital_art]
        scale:
          type: number
          enum: [1.5, 2, 3, 4]
        dryRun:
          oneOf:
            - type: boolean
            - { type: string, enum: ["true", "false", "1", "0"] }
          description: |
            When `true`, returns a `previewUrl` and does NOT replace the file.
            When `false` (default), runs the upscale and atomically replaces
            the target via the shared `performImageReplace` pipeline.
        progressId:
          type: string
          format: uuid
          description: |
            Optional UUID. When set, the server fans out the upscaler's per-tile
            percents via SSE to any client listening on
            `GET /api/backend/assets/images/upscale/progress/{progressId}`.

    ImageUpscaleDryRunResult:
      type: object
      required: [success, target, newDims, newSize, previewUrl, durationMs, cached, cacheKey]
      properties:
        success: { const: true }
        target: { type: string }
        newDims:
          type: object
          required: [w, h]
          properties:
            w: { type: integer }
            h: { type: integer }
        newSize: { type: integer }
        previewUrl:
          type: string
          description: |
            URL of the cached preview, fetchable from
            `GET /api/backend/assets/images/upscale/preview/{cacheKey}`.
        durationMs:
          type: integer
          description: |
            Time spent inside the upscaler. `0` when the result was a cache
            hit (use `cached: true` to distinguish).
        cached:
          type: boolean
          description: True if the result was served from the in-memory cache.
        cacheKey:
          type: string
          description: The cache key the preview URL embeds.

    ImageUpscaleConfirmResult:
      allOf:
        - $ref: "#/components/schemas/ImageReplaceResult"
        - type: object
          required: [durationMs]
          properties:
            durationMs:
              type: integer
              description: |
                Time spent inside the upscaler for this confirm. `0` when the
                preview cache was reused from an earlier dry-run.

    UndoDeleteResult:
      type: object
      required: [success, restored, conflicts]
      properties:
        success: { const: true }
        restored: { type: integer }
        conflicts: { type: array, items: { type: string } }

    # ─── Papierkorb (trash view) ───

    TrashEntry:
      type: object
      required: [originalPath, isDirectory, sizeBytes, mediaType]
      properties:
        originalPath: { type: string }
        isDirectory: { type: boolean }
        sizeBytes: { type: number }
        mediaType:
          type: string
          enum: [image, audio, video, other]

    TrashBatch:
      type: object
      required: [batchId, createdAt, expiresAt, sizeBytes, isCurrent, entries]
      properties:
        batchId: { type: string }
        createdAt:
          type: number
          description: Epoch ms; the batch directory's mtime (may include sub-ms precision on some filesystems).
        expiresAt:
          type: number
          description: Epoch ms; createdAt + TRASH_TTL_MS (24h).
        sizeBytes: { type: number }
        isCurrent:
          type: boolean
          description: True when this batch backs the in-memory `lastDeletion` pointer (i.e. the active undo toast).
        entries:
          type: array
          items: { $ref: "#/components/schemas/TrashEntry" }

    TrashDeepEntry:
      type: object
      required: [batchId, batchCreatedAt, batchExpiresAt, originalPath, sizeBytes, mediaType]
      properties:
        batchId: { type: string }
        batchCreatedAt:
          type: number
          description: Epoch ms; the owning batch's `createdAt`. Inlined so the search UI can render per-row time labels without joining against `/trash`.
        batchExpiresAt:
          type: number
          description: Epoch ms; `batchCreatedAt + TRASH_TTL_MS` (24h).
        originalPath:
          type: string
          description: Full path of the trashed file relative to the category root. Leaf files only — directories are not emitted.
        sizeBytes: { type: number }
        mediaType:
          type: string
          enum: [image, audio, video, other]

    TrashListResponse:
      type: object
      required: [batches]
      properties:
        batches:
          type: array
          items: { $ref: "#/components/schemas/TrashBatch" }

    TrashRestoreResult:
      type: object
      required: [success, restored, conflicts]
      properties:
        success: { const: true }
        restored: { type: integer }
        conflicts: { type: array, items: { type: string } }

    TrashPurgeResult:
      type: object
      required: [success, purged, batches]
      properties:
        success: { const: true }
        purged:
          type: integer
          description: Number of individual entries removed.
        batches:
          type: integer
          description: Number of batch directories fully removed.

    # ─── Video probe + cache ───

    VideoTrackInfo:
      type: object
      required: [index, codec, codecLong, channels, channelLayout, language, name, isDefault, browserCompatible]
      properties:
        index: { type: integer }
        codec: { type: string }
        codecLong: { type: string }
        channels: { type: integer }
        channelLayout: { type: string }
        language: { type: string }
        name: { type: string }
        isDefault: { type: boolean }
        browserCompatible: { type: boolean }

    VideoStreamInfo:
      type: object
      required: [width, height, codec, codecLong, fps, duration, bitrate, fileSize, isHdr, colorTransfer, colorPrimaries, pixFmt, faststart]
      properties:
        width: { type: integer }
        height: { type: integer }
        codec: { type: string }
        codecLong: { type: string }
        fps: { type: number }
        duration: { type: number }
        bitrate: { type: integer }
        fileSize: { type: integer }
        isHdr: { type: boolean }
        colorTransfer: { type: string }
        colorPrimaries: { type: string }
        pixFmt: { type: string }
        faststart: { type: boolean }

    VideoProbeResult:
      type: object
      required: [tracks, needsTranscode, videoInfo]
      properties:
        tracks:
          type: array
          items: { $ref: "#/components/schemas/VideoTrackInfo" }
        needsTranscode: { type: boolean }
        videoInfo:
          oneOf:
            - { $ref: "#/components/schemas/VideoStreamInfo" }
            - { type: "null" }
        sourceOnline: { type: boolean }

    CachedTracks:
      type: object
      required: [compressed, sdr, hasNoTrackCompressed, hasNoTrackSdr]
      properties:
        compressed: { type: array, items: { type: integer } }
        sdr: { type: array, items: { type: integer } }
        hasNoTrackCompressed: { type: boolean }
        hasNoTrackSdr: { type: boolean }

    WarmPreviewVideo:
      type: object
      required: [path, needsHdrProbe]
      properties:
        path: { type: string }
        needsHdrProbe: { type: boolean }
        isHdr:
          oneOf:
            - { type: boolean }
            - { type: "null" }

    MissingCacheEntry:
      type: object
      required: [game, questionIndex, video, start, end, kind]
      properties:
        game: { type: string }
        instance:
          oneOf:
            - { type: string }
            - { type: "null" }
        questionIndex: { type: integer }
        video: { type: string }
        start: { type: number }
        end: { type: number }
        track: { type: integer }
        kind: { type: string, enum: [compressed, sdr] }

    WarmupRequest:
      type: object
      required: [video, start, end]
      properties:
        video: { type: string }
        start: { type: number }
        end: { type: number }
        track: { type: integer }

    # ─── SSE event payloads ───

    FaststartEvent:
      type: object
      properties:
        percent: { type: number }
        alreadyFaststart: { type: boolean }
        done: { type: boolean }
        error: { type: string }

    WarmupSdrEvent:
      type: object
      properties:
        percent: { type: number }
        done: { type: boolean }
        cached: { type: boolean }
        error: { type: string }

    WarmAllEvent:
      type: object
      properties:
        index: { type: integer }
        total: { type: integer }
        current: { $ref: "#/components/schemas/MissingCacheEntry" }
        percent: { type: number }
        phase: { type: string }
        error: { type: string }
        done: { type: boolean }
        warmed: { type: integer }
        failed:
          type: array
          items:
            allOf:
              - $ref: "#/components/schemas/MissingCacheEntry"
              - type: object
                required: [error]
                properties:
                  error: { type: string }

    YouTubeDownloadEvent:
      type: object
      required: [phase]
      properties:
        phase:
          type: string
          enum: [resolving, downloading, processing, done, error]
        percent: { type: number }
        title: { type: string }
        fileName: { type: string }
        message: { type: string }
        jobId: { type: string }
        playlistTitle: { type: string }
        trackIndex: { type: integer }
        trackCount: { type: integer }

    YtDownloadJob:
      type: object
      required: [id, category, phase, percent, title, startedAt]
      properties:
        id: { type: string }
        category: { type: string }
        phase:
          type: string
          enum: [resolving, downloading, processing, done, error]
        percent: { type: number }
        title: { type: string }
        fileName: { type: string }
        error: { type: string }
        startedAt: { type: number }
        playlistTitle: { type: string }
        trackIndex: { type: integer }
        trackCount: { type: integer }
        tracks:
          type: array
          items:
            type: object
            required: [title, phase, percent]
            properties:
              title: { type: string }
              phase:
                type: string
                enum: [resolving, downloading, processing, done]
              percent: { type: number }

    AudioCoverEvent:
      type: object
      required: [phase]
      properties:
        jobId: { type: string }
        phase: { type: string, enum: [searching, done, error, confirm] }
        fileIndex: { type: integer }
        fileCount: { type: integer }
        fileName: { type: string }
        coverPath: { type: [string, "null"] }
        message: { type: string }
        fileDone: { type: boolean }
        filePhase: { type: string, enum: [done, error] }
        rateLimited: { type: boolean }
        foundArtist: { type: string }
        foundTrack: { type: string }
        coverPreview: { type: string }
        source: { type: string }

    AudioCoverJobFile:
      type: object
      required: [name, phase]
      properties:
        name: { type: string }
        phase: { type: string, enum: [pending, searching, done, error] }
        coverPath: { type: [string, "null"] }

    AudioCoverJob:
      type: object
      required: [id, phase, fileIndex, fileCount, fileName, files, startedAt]
      properties:
        id: { type: string }
        phase: { type: string, enum: [searching, done, error] }
        fileIndex: { type: integer }
        fileCount: { type: integer }
        fileName: { type: string }
        files:
          type: array
          items: { $ref: "#/components/schemas/AudioCoverJobFile" }
        startedAt: { type: number }
        error: { type: string }

    # ─── Reference video browsing ───

    ReferenceRoot:
      type: object
      required: [path, reachable]
      properties:
        path: { type: string }
        reachable: { type: boolean }
        label: { type: string }

    ReferenceBrowseEntry:
      type: object
      required: [name, kind]
      properties:
        name: { type: string }
        kind: { type: string, enum: [dir, file] }
        size: { type: integer }
        mtime: { type: number }

    ReferenceBrowseResponse:
      type: object
      required: [path, entries]
      properties:
        path: { type: string }
        parent:
          oneOf:
            - { type: string }
            - { type: "null" }
        entries:
          type: array
          items: { $ref: "#/components/schemas/ReferenceBrowseEntry" }

    UnlockPrecheckResponse:
      type: object
      required: [missing, offlineReferences]
      properties:
        missing: { type: array, items: { type: string } }
        offlineReferences: { type: array, items: { type: string } }

    # ─── System status + whisper ───

    SystemStatusResponse:
      type: object
      required: [server, storage, caches, processes, config, nasSync]
      properties:
        server:
          type: object
          required: [uptimeSeconds, nodeVersion, memoryMB, cpu, network, ffmpegAvailable, ytDlpAvailable, ytDlpPath]
          properties:
            uptimeSeconds: { type: number }
            nodeVersion: { type: string }
            memoryMB:
              type: object
              required: [rss, heapUsed, heapTotal]
              properties:
                rss: { type: number }
                heapUsed: { type: number }
                heapTotal: { type: number }
            cpu:
              type: object
              required: [processPercent, systemPercent, loadAvg, cores]
              properties:
                processPercent: { type: number }
                systemPercent: { type: number }
                loadAvg:
                  type: array
                  minItems: 3
                  maxItems: 3
                  items: { type: number }
                cores: { type: integer }
            network:
              type: object
              required: [bandwidthInPerSec, bandwidthOutPerSec, port, localIps, publicIp]
              properties:
                bandwidthInPerSec: { type: number }
                bandwidthOutPerSec: { type: number }
                port: { type: integer }
                localIps:
                  type: array
                  description: Non-internal IPv4 addresses, one per interface — combine with port for a LAN connect URL.
                  items:
                    type: object
                    required: [iface, address]
                    properties:
                      iface: { type: string }
                      address: { type: string }
                publicIp:
                  type: [string, "null"]
                  description: Public/WAN IP, or null when offline / not yet resolved.
            ffmpegAvailable: { type: boolean }
            ytDlpAvailable: { type: boolean }
            ytDlpPath: { type: [string, "null"] }
        storage:
          type: object
          required: [nasMount, mode, basePath, categories]
          properties:
            nasMount:
              type: object
              required: [reachable]
              properties:
                reachable: { type: boolean }
            mode: { type: string, const: local }
            basePath: { type: string }
            categories:
              type: array
              items:
                type: object
                required: [name, fileCount, totalSizeBytes]
                properties:
                  name: { type: string }
                  fileCount: { type: integer }
                  totalSizeBytes: { type: integer }
        caches:
          type: object
          required: [sdr, compressed, hdr, svgManifests]
          properties:
            sdr:
              type: object
              required: [count, totalSizeBytes, files]
              properties:
                count: { type: integer }
                totalSizeBytes: { type: integer }
                files: { type: array, items: { type: string } }
            compressed:
              type: object
              required: [count, totalSizeBytes, files]
              properties:
                count: { type: integer }
                totalSizeBytes: { type: integer }
                files: { type: array, items: { type: string } }
            hdr:
              type: object
              required: [count]
              properties:
                count: { type: integer }
            svgManifests:
              type: array
              description: |
                Status of each public-logo SVG manifest backing the `github-svg`
                image-search provider. See `/api/backend/system/svg-manifests`.
              items: { $ref: "#/components/schemas/SvgManifestStatus" }
        processes:
          type: object
          required: [ytDownloads, backgroundTasks]
          properties:
            ytDownloads:
              type: array
              items:
                type: object
                required: [id, phase, percent]
                properties:
                  id: { type: string }
                  title: { type: string }
                  phase: { type: string }
                  percent: { type: number }
                  playlistTotal: { type: integer }
                  playlistDone: { type: integer }
                  elapsed: { type: number }
            backgroundTasks:
              type: array
              items:
                type: object
                required: [id, type, label, status, elapsed]
                properties:
                  id: { type: string }
                  type: { type: string }
                  label: { type: string }
                  status: { type: string, enum: [queued, running, done, error] }
                  detail: { type: string }
                  elapsed: { type: number }
                  queuedAt: { type: number }
                  runningAt: { type: number }
                  meta:
                    type: object
                    properties:
                      video: { type: string }
                      start: { type: number }
                      end: { type: number }
                      track: { type: integer }
                      kind: { type: string, enum: [compressed, sdr] }
            whisperJobs:
              type: array
              items:
                type: object
                required: [video, language, status, percent, elapsed]
                properties:
                  video: { type: string }
                  language: { type: string }
                  status: { type: string }
                  phase: { type: string }
                  percent: { type: number }
                  elapsed: { type: number }
                  error: { type: string }
        config:
          type: object
          required: [activeGameshow, gameOrderCount, totalGameFiles]
          properties:
            activeGameshow: { type: string }
            gameOrderCount: { type: integer }
            totalGameFiles: { type: integer }
        nasSync:
          type: object
          required: [status, queueLength, throttled, bytesSynced]
          properties:
            status: { type: string, enum: [idle, syncing, error] }
            queueLength: { type: integer }
            currentOp: { type: [string, "null"] }
            throttled: { type: boolean }
            bytesSynced: { type: integer }
            startupSync:
              oneOf:
                - type: object
                  required: [phase, total, done]
                  properties:
                    phase: { type: string, enum: [scanning, syncing, done] }
                    total: { type: integer }
                    done: { type: integer }
                - { type: "null" }
            lastRescanAt:
              oneOf:
                - { type: number }
                - { type: "null" }

    WhisperLanguage:
      type: string
      enum: [en, de]

    WhisperStatus:
      type: string
      enum: [pending, running, paused, done, error, interrupted]

    WhisperPhase:
      type: string
      enum: [extracting, transcribing]

    WhisperJob:
      type: object
      required: [videoRelPath, language, status, percent, phaseStartedAt, pid, startedAt, updatedAt, transcriptPath, logPath, audioStreamIndex]
      properties:
        videoRelPath: { type: string }
        language: { $ref: "#/components/schemas/WhisperLanguage" }
        status: { $ref: "#/components/schemas/WhisperStatus" }
        phase: { $ref: "#/components/schemas/WhisperPhase" }
        percent: { type: number }
        phaseStartedAt: { type: number }
        pid: { type: [integer, "null"] }
        startedAt: { type: number }
        updatedAt: { type: number }
        transcriptPath: { type: [string, "null"] }
        logPath: { type: string }
        audioStreamIndex: { type: integer }
        error: { type: string }

    WhisperHealth:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        binPath: { type: [string, "null"] }
        modelPath: { type: [string, "null"] }
        reason: { type: string }
