          application/json:
            schema:
              type: object
              required: [path, index, first]
              properties:
                path: { type: string }
                index: { type: integer }
                first: { type: integer, description: "Raw index of the downloaded variant to mark as shown-first." }
      responses:
        "200":
          description: Marked
          content:
            application/json:
              schema:
                type: object
                properties: { success: { type: boolean }, first: { type: integer } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/backend/assets/videos/random-frame/prerender-reload:
    post:
      operationId: admin_randomFramePrerenderReload
      tags: [admin]
      summary: Re-extract a single downloaded variant from the source video
      description: Overwrites one variant's frame with a fresh random extraction. Requires the source video to be reachable (409 otherwise).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path, index, slot]
              properties:
                path: { type: string }
                index: { type: integer }
                slot: { type: integer, description: "Raw index of the downloaded variant to re-extract." }
                frameStart: { type: number }
                frameEnd: { type: number }
      responses:
        "200":
          description: Reloaded
          content:
            application/json:
              schema:
                type: object
                properties: { success: { type: boolean } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Source video not reachable
          content:
            application/json:
              schema: { type: object, properties: { error: { type: string } } }

  /api/backend/assets/videos/random-frame/prerender:
    post:
      operationId: admin_randomFramePrerender
      tags: [admin]
      summary: Prerender (download) fallback frames for random-frame questions
      description: |
        Prerenders N (default 3) still-frame variants PER QUESTION to the local cache so the
        show works when the source video is unreachable (NAS-only, not mounted at a live event).
        `index` is the question's original index, so the same movie used in several questions gets
        its own distinct frames. Resolves each source from local or the NAS mount. Streams SSE
        `data: { percent }` per item then `data: { done: true, failures }`. Re-running refills with
        fresh random frames. A per-item failure is reported as `data: { itemError }` but does not
        abort the batch.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required: [path, index]
                    properties:
                      path: { type: string, description: "Video rel-path (no leading /videos/)." }
                      index: { type: integer, description: "Question's original (pre-shuffle) index." }
                      frameStart: { type: number }
                      frameEnd: { type: number }
                count: { type: integer, description: "Variants per question (default 3, max 10)." }
      responses:
        "200":
          description: SSE stream of progress events
          content:
            text/event-stream:
              schema: { type: string, description: SSE lines }
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/backend/assets/videos/warm-preview:
